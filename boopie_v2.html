<style>
:root{--bg:#0c0c0e;--sur:#141418;--sur2:#1c1c22;--sur3:#242430;--bdr:#2a2a38;--tx:#ededf5;--tx2:#8888a8;--tx3:#4a4a65;--acc:#b57bee;--acc2:#7b8cf8;--grn:#3ecf8e;--yel:#f5c842;--pnk:#f06292;--red:#f07070;--r:12px;--rsm:8px;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;overflow:hidden;height:100vh}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh}
#topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:50}
#topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px}#topbar h1 span{color:var(--acc)}
.tbr{margin-left:auto;display:flex;align-items:center;gap:10px}
.gpill{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px;font-size:12px}
.gpill-bar{width:80px;height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.gpill-fill{height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc));border-radius:3px;transition:width .6s}
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;min-width:240px;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);padding:10px 8px 4px}
.nb{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);border:1px solid transparent;transition:all .15s;user-select:none}
.nb:hover{background:var(--sur2);color:var(--tx)}.nb.on{background:var(--sur3);color:var(--tx);border-color:var(--bdr)}
.nbi{font-size:15px;flex-shrink:0;width:18px;text-align:center}.nbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.nbp{font-size:10px;font-weight:700;flex-shrink:0}
.nb-lk{opacity:.45;cursor:default}.nb-lk:hover{background:transparent;color:var(--tx2)}
#content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ct{font-size:15px;font-weight:700;margin-bottom:12px;font-family:'Syne',sans-serif}
.pb{height:7px;background:var(--sur3);border-radius:4px;overflow:hidden}.pf{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.23,1,.32,1)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:12px 14px}
.sv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}.slb{font-size:11px;color:var(--tx2);margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--sur2);color:var(--tx);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--sur3)}.btn-p{background:var(--acc);border-color:var(--acc);color:#0c0c0e;font-weight:700}.btn-p:hover{opacity:.88}
.btn-g{background:var(--grn);border-color:var(--grn);color:#0c0c0e;font-weight:700}
.btn-sm{padding:4px 10px;font-size:12px}.btn-d{border-color:var(--red);color:var(--red);background:transparent}.btn-d:hover{background:rgba(240,112,112,.1)}

.chh:hover{background:var(--sur3)}.cha{color:var(--tx3);font-size:10px;transition:transform .2s;flex-shrink:0}.cha.op{transform:rotate(90deg)}
.cht{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex:1}
.chbadge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:var(--sur3);color:var(--tx2);flex-shrink:0}

.bulk{font-size:11px;color:var(--acc);cursor:pointer;padding:4px 8px;display:inline-block}.bulk:hover{text-decoration:underline}
.sr{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;transition:background .1s}
.sr:hover{background:var(--sur2)}.sr.dn{opacity:.5}
.ck{width:17px;height:17px;border-radius:5px;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.ck.on{border-color:var(--grn);background:var(--grn)}.ck.on::after{content:'✓';color:#0c0c0e;font-size:10px;font-weight:800}
.stx{flex:1;font-size:13px}.stx.dn{text-decoration:line-through;color:var(--tx3)}.sti{font-size:10px;margin-right:4px}.rtag{font-size:10px;color:var(--pnk);margin-left:5px}
.se{font-size:11px;color:var(--tx3);white-space:nowrap;margin-top:2px;flex-shrink:0}
.slog{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--tx3);cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;margin-top:1px;transition:all .12s}

.sli{width:54px;padding:3px 7px;font-size:12px;border-radius:6px;background:var(--sur3);border:1px solid var(--acc);color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;flex-shrink:0}

.dc{padding:5px 13px;border-radius:20px;border:1px solid var(--bdr);cursor:pointer;font-size:12px;font-weight:600;background:var(--sur2);color:var(--tx2);transition:all .15s;user-select:none}

.ee{font-size:26px;display:block;margin-bottom:5px}.elbl{font-size:12px;font-weight:600;color:var(--tx2)}
.vr{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:6px;cursor:pointer;transition:all .12s;margin-bottom:2px}
.vr:hover{background:var(--sur2)}.vr.dn{opacity:.45}
#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 16px;font-size:13px;box-shadow:0 6px 28px rgba(0,0,0,.5);max-width:310px;animation:tin .3s ease}

.cbit{position:fixed;width:7px;height:7px;border-radius:2px;animation:cfal linear forwards;pointer-events:none;z-index:9999}
@keyframes cfal{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}
#setup{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 25% 15%,rgba(181,123,238,.14) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(123,140,248,.09) 0%,transparent 55%),var(--bg);padding:20px}
.setup-card{background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:38px;max-width:540px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5)}

.mtog{display:flex;background:var(--sur2);padding:3px;border-radius:8px;border:1px solid var(--bdr)}
.mtb{flex:1;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;text-align:center;color:var(--tx2);transition:all .15s;user-select:none}
.mtb.on{background:var(--sur3);color:var(--tx)}
.pie-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ts-sec{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:var(--rsm);margin-bottom:4px;border:1px solid var(--bdr);background:var(--sur2);transition:all .15s;cursor:pointer}

.da-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;font-size:12px;color:var(--tx2)}
.da-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ub{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.25);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--tx2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
#day-cel{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px}
.day-cel-card{background:var(--sur);border:2px solid var(--yel);border-radius:20px;padding:40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 60px rgba(245,200,66,.25)}
@media(max-width:900px){#sidebar{width:200px;min-width:200px}}
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);padding:8px 4px;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:100;gap:0;flex-direction:row}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:var(--rsm);cursor:pointer;border:none;background:transparent;color:var(--tx3);font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;transition:color .15s;-webkit-tap-highlight-color:transparent}
.mn-btn.on{color:var(--acc)}.mn-btn-icon{font-size:20px;line-height:1}

  #sidebar{display:none}
  #content{padding:16px 14px;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
  #topbar{padding:0 16px;padding-top:env(safe-area-inset-top);height:calc(52px + env(safe-area-inset-top))}
  #mobile-nav{display:flex !important}
  .sg{grid-template-columns:repeat(2,1fr)}
  .btn{padding:9px 16px}
}
</style>

// ═══ CALCULATIONS ══════════════════════════════════════════
function fmt(m){if(!m&&m!==0)return'—';if(m<60)return m+' min';const h=Math.floor(m/60),mn=m%60;if(!mn)return h+' hr'+(h>1?'s':'');return h+' hr'+(h>1?'s':'')+' '+mn+' min';}
function fmtH(h){if(h<1)return Math.round(h*60)+' min';return h.toFixed(1)+' hrs';}
function adapt(cId,tp){const secs=allS(cId).filter(s=>ST.logged[s.id]!=null);const typed=secs.filter(s=>s.tp===tp);if(typed.length>=3)return Math.round(typed.reduce((a,s)=>a+ST.logged[s.id],0)/typed.length);if(secs.length>=3)return Math.round(secs.reduce((a,s)=>a+ST.logged[s.id],0)/secs.length);return null;}
function est(sec){const a=adapt(sec.cId,sec.tp);return a!=null?a:sec.m;}
function remMin(cId){return allS(cId).filter(s=>!s.ir&&!ST.completed[s.id]).reduce((a,s)=>a+est(s),0);}
function doneMin(cId){return coreS(cId).filter(s=>ST.completed[s.id]).reduce((a,s)=>a+est(s),0);}
function cprog(cId){const cs=coreS(cId);if(!cs.length)return 0;return cs.filter(s=>ST.completed[s.id]).length/cs.length;}
function gprog(){const cs=coreS();if(!cs.length)return 0;return cs.filter(s=>ST.completed[s.id]).length/cs.length;}

function courseHrsPerDay(cId){
  const active=activeCourses();
  if(!active.includes(cId))return 0;
  const totalRem=active.reduce((a,c)=>a+remMin(c),0);
  if(!totalRem)return 0;
  return ST.hoursPerDay*(remMin(cId)/totalRem);
}

function wdUntil(ds){if(!ds)return null;const tgt=new Date(ds);tgt.setHours(23,59,0,0);const now=new Date();now.setHours(0,0,0,0);let c=0;const d=new Date(now);while(d<=tgt){if(ST.workDays.includes(d.getDay()))c++;d.setDate(d.getDate()+1);}return c;}

function dlFromPool(cId){
  const hpd=courseHrsPerDay(cId);if(!hpd)return'—';
  const rem=remMin(cId);const dn=Math.ceil((rem/60)/hpd);
  let c=0;const d=new Date();
  while(c<dn){d.setDate(d.getDate()+1);if(ST.workDays.includes(d.getDay()))c++;}
  return d.toISOString().slice(0,10);
}

function globalDl(){
  const dls=Object.keys(COURSES).map(cId=>{if(cprog(cId)>=1)return null;return dlFromPool(cId);}).filter(d=>d&&d!=='—');
  if(!dls.length)return null;dls.sort();return dls[dls.length-1];
}

function hrsFromDeadline(){const rem=remMin();const days=wdUntil(ST.deadline);if(!days||days<=0)return'—';return(rem/60/days).toFixed(1);}

function csched(cId){
  const dl=ST.courseDeadlines[cId];
  if(dl){const days=wdUntil(dl);const rem=remMin(cId);const hpd=(!days||days<=0)?'—':(rem/60/days).toFixed(1);return{deadline:dl,hpdStr:hpd};}
  const hpd=courseHrsPerDay(cId);
  return{deadline:dlFromPool(cId),hpdStr:hpd?hpd.toFixed(1):0};
}

// ═══ SESSION BUILDER ═══════════════════════════════════════
function buildSession(){
  const targetMin=todayGoalMin();
  const active=activeCourses();
  if(!active.length)return[];
  const totalRem=active.reduce((a,c)=>a+remMin(c),0);
  const allocs={};active.forEach(cId=>{allocs[cId]=Math.round(targetMin*(totalRem?remMin(cId)/totalRem:1/active.length));});
  const session=[];
  for(const cId of active){
    let budget=allocs[cId];
    outer:for(const ch of COURSES[cId].chapters){
      for(const sec of ch.secs){
        if(sec.ir||ST.completed[sec.id])continue;
        if(budget<=0)break outer;
        session.push({secId:sec.id,cId,title:sec.t,estMin:est(sec),tp:sec.tp});
        budget-=est(sec);
      }
    }
  }
  return session;
}

function todayDoneIds(){return ST.dailyDone[todayKey()]||[];}
function todayGoalMin(){const k=todayKey();const commit=ST.todayCommitHrs[k];return commit?commit*60:ST.hoursPerDay*60;}
function todayDoneMin(){const ids=todayDoneIds();return ids.reduce((a,id)=>{const sec=allS().find(s=>s.id===id);return a+(sec?est(sec):0);},0);}
function dailyGoalMet(){return todayDoneMin()>=todayGoalMin();}

// ═══ DOM HELPERS ════════════════════════════════════════════
let editLog=null;
function el(tag,props){
  const node=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='class')node.className=v;else if(k==='style')node.style.cssText=v;
    else if(k.startsWith('on'))node.addEventListener(k.slice(2).toLowerCase(),v);
    else node.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];if(c==null)continue;
    if(typeof c==='string'||typeof c==='number')node.appendChild(document.createTextNode(String(c)));
    else node.appendChild(c);
  }
  return node;
}
// SVG-namespace element creator (required for SVG children to render)
function svgEl(tag,props){
  const NS='http://www.w3.org/2000/svg';
  const node=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='style')node.style.cssText=v;
    else node.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];if(c==null)continue;
    if(typeof c==='string'||typeof c==='number')node.appendChild(document.createTextNode(String(c)));
    else node.appendChild(c);
  }
  return node;
}
function d(cls){const args=['div',{class:cls}];for(let i=1;i<arguments.length;i++)args.push(arguments[i]);return el.apply(null,args);}

function pb(pct,color,h){h=h||7;const bar=d('pb');bar.style.height=h+'px';const fill=d('pf');fill.style.width=(Math.min(pct,1)*100).toFixed(1)+'%';fill.style.background=color;bar.appendChild(fill);return bar;}

// ═══ PIE CHART ══════════════════════════════════════════════
function makePie(segments,size){
  size=size||110;
  const total=segments.reduce((a,s)=>a+s.value,0);
  const svg=el('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size,style:'flex-shrink:0'});
  if(!total){svg.appendChild(el('circle',{cx:size/2,cy:size/2,r:size/2-4,fill:'var(--sur3)'}));return svg;}
  const cx=size/2,cy=size/2,r=size/2-4,ir=r*.55;let angle=-Math.PI/2;
  for(const seg of segments){
    if(!seg.value)continue;
    const sw=(seg.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sw),y2=cy+r*Math.sin(angle+sw);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+sw),iy2=cy+ir*Math.sin(angle+sw);
    const lg=sw>Math.PI?1:0;
    svg.appendChild(el('path',{d:'M '+ix1+' '+iy1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+ix2+' '+iy2+' A '+ir+' '+ir+' 0 '+lg+' 0 '+ix1+' '+iy1+' Z',fill:seg.color,stroke:'var(--sur)','stroke-width':'2'}));
    angle+=sw;
  }
  return svg;
}

// ═══ DASHBOARD ══════════════════════════════════════════════
function vDash(){
  const w=d('');
  const gp=gprog();
  const csDone=coreS().filter(s=>ST.completed[s.id]).length;
  const csTotal=coreS().length;
  const resDone=allS().filter(s=>s.ir&&ST.completed[s.id]).length;
  const resTotal=allS().filter(s=>s.ir).length;
  const edl=ST.deadlineMode==='hours'?globalDl():ST.deadline;
  const dhrs=ST.deadlineMode==='deadline'?hrsFromDeadline():ST.hoursPerDay;

  // Cascade finish estimates for locked courses
  // After phase 1 finishes, phase 2 starts; after phase 2 finishes, phase 3 starts
  function cascadeFinish(cId){
    if(isUnlocked(cId))return{deadline:dlFromPool(cId),hpdStr:csched(cId).hpdStr,locked:false};
    // Work out when prereq finishes
    const prereqId=COURSES[cId].unlockAfter;
    const prereqDl=isUnlocked(prereqId)?dlFromPool(prereqId):cascadeFinish(prereqId).deadline;
    if(!prereqDl||prereqDl==='—')return{deadline:'—',hpdStr:'—',locked:true};
    // Then add days needed for this course at hoursPerDay
    const rem=remMin(cId);const dn=Math.ceil((rem/60)/ST.hoursPerDay);
    let c=0;const dt=new Date(prereqDl);
    while(c<dn){dt.setDate(dt.getDate()+1);if(ST.workDays.includes(dt.getDay()))c++;}
    return{deadline:dt.toISOString().slice(0,10),hpdStr:ST.hoursPerDay,locked:true};
  }

  const msgs=['Ready to dive in? Head to Today\'s Session! 🎵','You\'re off to a great start — every section you do is real learning! 🌱','Look at that momentum. You\'re almost halfway there! 🚀','Over halfway! Your consistency is genuinely impressive 💪','Almost there — the finish line is in sight! 🏁','🎓 Every single course complete. You actually did it! 🎉'];
  const msgIdx=gp===0?0:gp<0.25?1:gp<0.5?2:gp<0.75?3:gp<1?4:5;
  w.appendChild(el('h2',{style:'font-family:Syne,sans-serif;font-size:21px;font-weight:800;margin-bottom:3px'},'Overview'));

  // Hero
  const hero=d('hprog');
  const hr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:5px'});
  hr.appendChild(el('span',{style:'font-size:12px;color:var(--tx2)'},'Overall Progress'));
  hr.appendChild(el('span',{style:'font-family:Syne,sans-serif;font-size:16px;font-weight:800'},Math.round(gp*100)+'%'));
  hero.appendChild(hr);hero.appendChild(pb(gp,'linear-gradient(90deg,var(--acc2),var(--acc))',10));
  const hs=el('div',{style:'display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--tx3)'});
  hs.appendChild(t(csDone+' / '+csTotal+' core sections'));hs.appendChild(t(resDone+' / '+resTotal+' resources'));
  hero.appendChild(hs);w.appendChild(hero);

  // Stats
  const sg=d('sg');
  sg.appendChild(sc(fmt(doneMin()),'Completed','var(--acc)'));
  sg.appendChild(sc(fmt(remMin()),'Remaining'));
  sg.appendChild(sc(edl||'Not set','Est. project finish'));
  sg.appendChild(sc(dhrs+' hrs/day','Daily target'));

  // Course cards — ALL phases shown, locked ones show cascade estimates
  w.appendChild(el('h3',{style:'font-family:Syne,sans-serif;font-size:15px;font-weight:700;margin-bottom:10px'},'Full Project Timeline'));

  for(const ph of[1,2,3]){
    const phd=d('');
    // Phase total hours remaining
    const phCourses=Object.entries(COURSES).filter(([,c])=>c.phase===ph);
    const phRemMins=phCourses.reduce((a,[cId])=>a+remMin(cId),0);
    const phLabel='Phase '+ph+' '+(ph===1?'— Active from day 1':ph===2?'— Starts after Theory Ess. done':'— Starts after Comp. Theory done')+' · '+fmt(phRemMins)+' remaining';
    phd.appendChild(el('div',{style:'font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--tx3);padding:'+(ph>1?'14':'4')+'px 0 7px;'+(ph>1?'border-top:1px solid var(--bdr);margin-top:4px':'')+';display:flex;align-items:center;gap:6px'},
      el('span',{style:'width:7px;height:7px;border-radius:50%;background:'+PC[ph]+';flex-shrink:0;display:inline-block'},''),
      phLabel
    ));

    for(const[cId,c]of phCourses){
      const cp=cprog(cId),rem2=remMin(cId);
      const locked2=!isUnlocked(cId);
      const sched=locked2?cascadeFinish(cId):csched(cId);

      const card=el('div',{class:'card',style:'cursor:'+(locked2?'default':'pointer')+';'+(locked2?'border-style:dashed;opacity:.8':''),
        onclick:locked2?null:()=>{CV='course';CC_id=cId;render();},
        onmouseenter:ev=>{if(!locked2)ev.currentTarget.style.borderColor=c.color;},
        onmouseleave:ev=>{ev.currentTarget.style.borderColor='var(--bdr)';}
      });
      const ch=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:8px'});
      ch.appendChild(el('span',{style:'font-size:18px'},c.icon));
      ch.appendChild(el('span',{style:'font-family:Syne,sans-serif;font-size:14px;font-weight:700;flex:1'},c.name));
      if(cp>=1)ch.appendChild(el('span',{style:'font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(62,207,142,.12);color:var(--grn);font-weight:600'},'Complete ✓'));
      if(locked2)ch.appendChild(el('span',{style:'font-size:10px;padding:2px 7px;border-radius:20px;background:var(--sur3);color:var(--tx3);font-weight:600'},'🔒 Locked'));
      card.appendChild(ch);
      const pr=el('div',{style:'display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:4px'});
      pr.appendChild(t(Math.round(cp*100)+'% complete · '+fmt(rem2)+' remaining'));
      card.appendChild(pr);card.appendChild(pb(cp,c.color));
      const ftStyle='margin-top:6px;font-size:11px;color:var(--tx3)';
      if(cp>=1){
        card.appendChild(el('div',{style:ftStyle},'✓ Finished'));
      }else if(locked2){
        const prereq=COURSES[c.unlockAfter];
        card.appendChild(el('div',{style:ftStyle},'Unlocks after '+prereq.name+' · Est. finish: '+sched.deadline+' · Full '+ST.hoursPerDay+' hrs/day'));
      }else{
        card.appendChild(el('div',{style:ftStyle},'Est. finish: '+sched.deadline+'  ·  '+sched.hpdStr+' hrs/day (proportional)'));
      }
      phd.appendChild(card);
    }
    w.appendChild(phd);
  }
  return w;
}

// ═══ COURSE VIEW ════════════════════════════════════════════
function vCourse(cId){
  const c=COURSES[cId],cp=cprog(cId),rem=remMin(cId),done=doneMin(cId),sched=csched(cId);
  const w=d('');
  w.appendChild(el('span',{style:'font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:'+PC[c.phase]+';color:#0c0c0e;margin-bottom:6px;display:inline-block'},'Phase '+c.phase));
  w.appendChild(el('h2',{style:'font-family:Syne,sans-serif;font-size:21px;font-weight:800;margin:5px 0 3px'},c.icon+' '+c.name));
  w.appendChild(el('p',{style:'color:var(--tx2);font-size:13px;margin-bottom:14px'},cp>=1?'🎓 Course complete! Legend!':cp===0?'Ready to dive in?':'Keep going!'));
  const sg=d('sg');
  sg.appendChild(sc(Math.round(cp*100)+'%','Progress',c.color));
  sg.appendChild(sc(fmt(rem),'Remaining'));sg.appendChild(sc(fmt(done),'Completed'));
  sg.appendChild(sc(sched.hpdStr+' hrs','Daily share'));
  w.appendChild(sg);
  const dc=d('card');dc.appendChild(el('div',{class:'ct',style:'font-size:13px;margin-bottom:8px'},'📅 Course Deadline'));
  const dr=d('row');
  dr.appendChild(el('input',{type:'date',class:'inp',value:ST.courseDeadlines[cId]||'',style:'width:180px',oninput:ev=>{ST.courseDeadlines[cId]=ev.target.value;save();render();}}));
  if(ST.courseDeadlines[cId]){
    dr.appendChild(el('span',{style:'font-size:12px;color:var(--tx2)'},'→ '+sched.hpdStr+' hrs/day'));
    dr.appendChild(el('span',{style:'font-size:11px;color:var(--tx3);cursor:pointer',onclick:()=>{delete ST.courseDeadlines[cId];save();render();}},'✕ clear'));
  }else{
    dr.appendChild(el('span',{style:'font-size:12px;color:var(--tx3)'},'Est. '+sched.deadline+' ('+ST.hoursPerDay+' hrs/day shared pool)'));
  }
  dc.appendChild(dr);w.appendChild(dc);
  for(const[ci,ch]of c.chapters.entries())w.appendChild(renderChap(cId,ci,ch));
  return w;
}

function renderChap(cId,ci,ch){
  const isOpen=ST.openChs[ch.id]!==false;
  const done=ch.secs.filter(s=>ST.completed[s.id]).length;
  const allDone=done===ch.secs.length;
  const con=d('chapter');
  const head=el('div',{class:'chh',onclick:()=>{ST.openChs[ch.id]=!isOpen;save();render();}});
  head.appendChild(el('span',{class:'cha'+(isOpen?' op':'')},'▶'));
  head.appendChild(el('span',{class:'cht'},ch.title));
  head.appendChild(el('span',{class:'chbadge'+(allDone?' dn':'')},done+'/'+ch.secs.length));
  con.appendChild(head);
  if(isOpen){
    const body=d('chbody');
    body.appendChild(el('span',{class:'bulk',onclick:ev=>{ev.stopPropagation();toggleCh(cId,ci);}},allDone?'↩ Uncheck all':'✓ Mark all complete'));
    for(const sec of ch.secs)body.appendChild(renderRow(sec));
    con.appendChild(body);
  }
  return con;
}

function renderRow(sec){
  const isDone=!!ST.completed[sec.id],isEditing=editLog===sec.id,logged=ST.logged[sec.id],estime=est(sec);
  const isSkip=!!ST.skipped[sec.id];
  const row=el('div',{class:'sr'+(isDone?' dn':''),onclick:()=>{if(!isSkip)toggleS(sec.id);}});
  row.appendChild(el('div',{class:'ck'+(isDone?' on':'')}));
  const tx=el('span',{class:'stx'+(isDone?' dn':'')},el('span',{class:'sti'},TI[sec.tp]||'📖'),sec.t);
  if(sec.ir){const rt=document.createElement('span');rt.className='rtag';rt.textContent=' resource';tx.appendChild(rt);}
  if(isSkip){const sk=document.createElement('span');sk.style='font-size:10px;color:var(--tx3);margin-left:5px';sk.textContent='⏭️ skipped';tx.appendChild(sk);}
  row.appendChild(tx);
  row.appendChild(el('span',{class:'se'},fmt(estime)));
  if(isDone&&!isSkip){
    if(!isEditing){row.appendChild(el('button',{class:'slog'+(logged?' lgg':''),onclick:ev=>{ev.stopPropagation();editLog=sec.id;render();}},logged?logged+'m':'log'));}
    else{const inp=el('input',{type:'number',class:'sli',min:'1',max:'600',placeholder:'min',value:logged||'',onclick:ev=>ev.stopPropagation(),onblur:ev=>{const v=parseInt(ev.target.value);if(v>0){ST.logged[sec.id]=v;save();}editLog=null;render();},onkeydown:ev=>{if(ev.key==='Enter')ev.target.blur();if(ev.key==='Escape'){editLog=null;render();}}});row.appendChild(inp);setTimeout(()=>inp.focus(),30);}
  }
  if(!isDone){
    row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);cursor:pointer;padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;flex-shrink:0',
      title:'Skip (mark done, saved for review)',
      onclick:ev=>{ev.stopPropagation();skipS(sec.id);}},'⏭️'));
  }else if(isSkip){
    row.appendChild(el('span',{style:'font-size:10px;color:var(--acc);cursor:pointer;padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;flex-shrink:0',
      title:'Un-skip',
      onclick:ev=>{ev.stopPropagation();unskipS(sec.id);}},'↩'));
  }
  return row;
}

// ═══ VIDEOS VIEW ════════════════════════════════════════════
function vVideos(){
  const w=d('');
  w.appendChild(el('h2',{style:'font-family:Syne,sans-serif;font-size:21px;font-weight:800;margin-bottom:3px'},'🎬 Video Resources'));
  w.appendChild(el('p',{style:'color:var(--tx2);font-size:13px;margin-bottom:14px'},'Perfect for low-energy sessions. Completions count toward your progress!'));
  const bv=vidS();
  const cv=(ST.customVideos||[]).map((v,i)=>({id:'cv'+i,t:v.title,m:20,tp:'video',ir:true,iv:true,cId:'custom',ci:-1}));
  const all=[...bv,...cv];
  const doneCt=all.filter(v=>ST.completed[v.id]).length;
  w.appendChild(el('div',{style:'font-size:12px;color:var(--tx2);margin-bottom:12px'},doneCt+' / '+all.length+' watched'));
  const ac=d('card');ac.appendChild(el('div',{style:'font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:8px'},'Add custom video'));
  let nvt='';
  const ni=el('input',{type:'text',class:'inp',placeholder:'Video title...',style:'flex:1',oninput:ev=>{nvt=ev.target.value;}});
  const ab=el('button',{class:'btn btn-sm',onclick:()=>{if(nvt.trim()){ST.customVideos=[...(ST.customVideos||[]),{title:nvt.trim()}];save();render();}}},'+ Add');
  ac.appendChild(el('div',{class:'row'},ni,ab));w.appendChild(ac);
  const groups={};
  for(const v of all){const k=v.cId==='custom'?'custom':v.cId;if(!groups[k])groups[k]=[];groups[k].push(v);}
  for(const[gId,vids]of Object.entries(groups)){
    const cn=gId==='custom'?'📎 Custom Added':COURSES[gId].icon+' '+COURSES[gId].name;
    const gc=d('card');gc.style.marginBottom='12px';
    gc.appendChild(el('div',{style:'font-family:Syne,sans-serif;font-size:13px;font-weight:700;margin-bottom:8px'},cn));
    for(const v of vids){
      const isDone=!!ST.completed[v.id];
      const row=el('div',{class:'vr'+(isDone?' dn':''),onclick:()=>{ST.completed[v.id]=!ST.completed[v.id];save();if(ST.completed[v.id])toast('🎬 Video watched!',true);render();}});
      row.appendChild(el('div',{class:'ck'+(isDone?' on':'')}));
      row.appendChild(el('span',{style:'font-size:14px;flex-shrink:0'},'🎬'));
      const txEl=document.createElement('span');txEl.style='flex:1;font-size:13px;'+(isDone?'text-decoration:line-through':'');txEl.textContent=v.t;row.appendChild(txEl);
      if(v.id.startsWith('cv')){const di=parseInt(v.id.replace('cv',''));row.appendChild(el('span',{style:'font-size:11px;color:var(--tx3);cursor:pointer;flex-shrink:0',onclick:ev=>{ev.stopPropagation();ST.customVideos.splice(di,1);save();render();}},'✕'));}
      gc.appendChild(row);
    }
    w.appendChild(gc);
  }
  return w;
}

// ═══ SETTINGS VIEW ══════════════════════════════════════════
function vSettings(){
  const w=d('');
  w.appendChild(el('h2',{style:'font-family:Syne,sans-serif;font-size:21px;font-weight:800;margin-bottom:16px'},'⚙️ Settings'));
  const dc=d('card');dc.appendChild(el('div',{class:'ct'},'Study Days'));
  const dg=d('dg');
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach((day,i)=>{dg.appendChild(el('div',{class:'dc'+(ST.workDays.includes(i)?' on':''),onclick:()=>{if(ST.workDays.includes(i))ST.workDays=ST.workDays.filter(x=>x!==i);else ST.workDays=[...ST.workDays,i].sort();save();render();}},day));});
  dc.appendChild(dg);w.appendChild(dc);

  const hc=d('card');hc.appendChild(el('div',{class:'ct'},'Daily Study Goal'));
  hc.appendChild(el('label',{class:'il'},'Total hours per study day (shared across active courses)'));
  hc.appendChild(el('input',{type:'number',class:'inp',min:'0.5',max:'12',step:'0.5',value:ST.hoursPerDay,style:'width:110px',oninput:ev=>{ST.hoursPerDay=parseFloat(ev.target.value)||1;save();}}));
  hc.appendChild(el('div',{style:'margin-top:10px;font-size:12px;color:var(--tx2)'},'Estimated project completion: ',el('strong',{style:'color:var(--tx)'},globalDl()||'—')));
  hc.appendChild(el('div',{style:'margin-top:6px;font-size:11px;color:var(--tx3)'},'Each active course gets a proportional share based on remaining work.'));
  const active=activeCourses();
  if(active.length){
    const sw=el('div',{style:'margin-top:12px;display:flex;flex-direction:column;gap:5px'});
    active.forEach(cId=>{
      const c=COURSES[cId];const hpd=courseHrsPerDay(cId);
      const row=el('div',{style:'display:flex;align-items:center;gap:8px;font-size:12px'});
      row.appendChild(t(c.icon));row.appendChild(el('span',{style:'color:var(--tx2);flex:1'},c.short));
      row.appendChild(el('span',{style:'color:'+c.color+';font-weight:600'},fmtH(hpd)+'/day'));
      row.appendChild(el('span',{style:'color:var(--tx3)'},'('+Math.round(hpd/ST.hoursPerDay*100)+'%)'));
      sw.appendChild(row);
    });
    hc.appendChild(sw);
  }
  w.appendChild(hc);

  const dlc=d('card');dlc.appendChild(el('div',{class:'ct'},'Hard Deadline (optional)'));
  dlc.appendChild(el('label',{class:'il'},'Override with a specific date to see required hours/day'));
  dlc.appendChild(el('input',{type:'date',class:'inp',value:ST.deadline,style:'width:190px',onchange:ev=>{ST.deadline=ev.target.value;ST.deadlineMode='deadline';save();render();}}));
  if(ST.deadline)dlc.appendChild(el('div',{style:'margin-top:9px;font-size:12px;color:var(--tx2)'},"You'd need: ",el('strong',{style:'color:var(--tx)'},hrsFromDeadline()+' hrs/day total')));
  dlc.appendChild(el('button',{class:'btn btn-sm',style:'margin-top:8px',onclick:()=>{ST.deadline='';ST.deadlineMode='hours';save();render();}},'Clear deadline'));
  w.appendChild(dlc);

  const ae=d('card');ae.appendChild(el('div',{class:'ct'},'Adaptive Estimates'));
  ae.appendChild(el('p',{style:'font-size:12px;color:var(--tx2);margin-bottom:12px'},'Recalibrates per-course and per-section-type. Needs 3+ logged sessions per type before adapting.'));
  for(const[cId,c]of Object.entries(COURSES)){
    const lg=allS(cId).filter(s=>ST.logged[s.id]!=null);
    const avg=lg.length?Math.round(lg.reduce((a,s)=>a+ST.logged[s.id],0)/lg.length):null;
    const row=el('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px'});
    row.appendChild(t(c.icon));row.appendChild(el('span',{style:'color:var(--tx2);flex:1'},c.short));
    row.appendChild(el('span',{style:'color:'+(avg?'var(--tx)':'var(--tx3)')},avg?'avg '+avg+' min ('+lg.length+' logged)':'no data yet'));
    ae.appendChild(row);
  }
  w.appendChild(ae);

  const slc=d('card');slc.appendChild(el('div',{class:'ct'},'Save & Load'));
  slc.appendChild(el('p',{style:'font-size:12px;color:var(--tx2);margin-bottom:12px'},'Progress auto-saves in this browser. Export to back up or move to another device.'));
  slc.appendChild(el('div',{class:'row'},el('button',{class:'btn btn-g',onclick:exportSave},'💾 Export save file'),el('button',{class:'btn',onclick:importSave},'📂 Import save file')));
  w.appendChild(slc);

  const dz=d('card');dz.appendChild(el('div',{style:'font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:var(--red);margin-bottom:8px'},'Danger Zone'));
  dz.appendChild(el('button',{class:'btn btn-d',onclick:()=>{if(confirm('Reset ALL progress? Cannot be undone.')){ST.completed={};ST.skipped={};ST.logged={};ST.customVideos=[];ST.dailyDone={};ST.dailyGoalCelebrated={};save();render();}}},'Reset All Progress'));
  w.appendChild(dz);
  return w;
}

    el('p',{style:'color:var(--tx2);margin-bottom:28px;font-size:14px'},"Let's set up your schedule. Change anything later."),
    el('div',{class:'fg'},
      el('label',{class:'il'},'Which days do you study?'),

// ═══ BOOT ═══════════════════════════════════════════════════
(async()=>{
  const root=document.getElementById('root');
  root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)"><div style="text-align:center;color:var(--tx2);font-family:Syne,sans-serif"><div style="font-size:40px;margin-bottom:14px">🎵</div><div style="font-size:14px">Loading your progress\u2026</div></div></div>';
  await load();
  render();
})();

// Register service worker for offline support
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='mss-v1';
const ASSETS=[self.registration.scope];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const rc=res.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));return res;}).catch(()=>caches.match(e.request)))));
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

function renderChap(cId,ci,ch){
  const isOpen=ST.openChs[ch.id]!==false;
  const done=ch.secs.filter(s=>ST.completed[s.id]).length;
  const allDone=done===ch.secs.length;
  const con=d('chapter');
  const head=el('div',{class:'chh',onclick:()=>{ST.openChs[ch.id]=!isOpen;save();render();}});
  head.appendChild(el('span',{class:'cha'+(isOpen?' op':'')},'▶'));
  head.appendChild(el('span',{class:'cht'},ch.title));
  head.appendChild(el('span',{class:'chbadge'+(allDone?' dn':'')},done+'/'+ch.secs.length));
  con.appendChild(head);
  if(isOpen){
    const body=d('chbody');
    body.appendChild(el('span',{class:'bulk',onclick:ev=>{ev.stopPropagation();toggleCh(cId,ci);}},allDone?'↩ Uncheck all':'✓ Mark all complete'));
    for(const sec of ch.secs)body.appendChild(renderRow(sec));
    con.appendChild(body);
  }
  return con;
}

function renderRow(sec){
  const isDone=!!ST.completed[sec.id],isEditing=editLog===sec.id,logged=ST.logged[sec.id],estime=est(sec);
  const isSkip=!!ST.skipped[sec.id];
  const row=el('div',{class:'sr'+(isDone?' dn':''),onclick:()=>{if(!isSkip)toggleS(sec.id);}});
  row.appendChild(el('div',{class:'ck'+(isDone?' on':'')}));
  const tx=el('span',{class:'stx'+(isDone?' dn':'')},el('span',{class:'sti'},TI[sec.tp]||'📖'),sec.t);
  if(sec.ir){const rt=document.createElement('span');rt.className='rtag';rt.textContent=' resource';tx.appendChild(rt);}
  if(isSkip){const sk=document.createElement('span');sk.style='font-size:10px;color:var(--tx3);margin-left:5px';sk.textContent='⏭️ skipped';tx.appendChild(sk);}
  row.appendChild(tx);
  row.appendChild(el('span',{class:'se'},fmt(estime)));
  if(isDone&&!isSkip){
    if(!isEditing){row.appendChild(el('button',{class:'slog'+(logged?' lgg':''),onclick:ev=>{ev.stopPropagation();editLog=sec.id;render();}},logged?logged+'m':'log'));}
    else{const inp=el('input',{type:'number',class:'sli',min:'1',max:'600',placeholder:'min',value:logged||'',onclick:ev=>ev.stopPropagation(),onblur:ev=>{const v=parseInt(ev.target.value);if(v>0){ST.logged[sec.id]=v;save();}editLog=null;render();},onkeydown:ev=>{if(ev.key==='Enter')ev.target.blur();if(ev.key==='Escape'){editLog=null;render();}}});row.appendChild(inp);setTimeout(()=>inp.focus(),30);}
  }
  if(!isDone){
    row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);cursor:pointer;padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;flex-shrink:0',
      title:'Skip (mark done, saved for review)',
      onclick:ev=>{ev.stopPropagation();skipS(sec.id);}},'⏭️'));
  }else if(isSkip){
    row.appendChild(el('span',{style:'font-size:10px;color:var(--acc);cursor:pointer;padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;flex-shrink:0',
      title:'Un-skip',
      onclick:ev=>{ev.stopPropagation();unskipS(sec.id);}},'↩'));
  }
  return row;
}

  if(ST.deadline)dlc.appendChild(el('div',{style:'margin-top:9px;font-size:12px;color:var(--tx2)'},"You'd need: ",el('strong',{style:'color:var(--tx)'},hrsFromDeadline()+' hrs/day total')));
  dlc.appendChild(el('button',{class:'btn btn-sm',style:'margin-top:8px',onclick:()=>{ST.deadline='';ST.deadlineMode='hours';save();render();}},'Clear deadline'));
  w.appendChild(dlc);

  // ── What Would It Take? calculator ──────────────────────────
  const ww=d('card');
  ww.appendChild(el('div',{class:'ct'},'⏱ What Would It Take?'));
  ww.appendChild(el('p',{style:'font-size:12px;color:var(--tx2);margin-bottom:14px'},'Pick a target date and see exactly how much you\'d need to do each day to finish on time.'));

  const targetRow=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap'});
  targetRow.appendChild(el('label',{style:'font-size:12px;color:var(--tx2);flex-shrink:0'},'I want to finish by'));
  const targetInp=el('input',{type:'date',class:'inp',style:'width:175px'});
  // Default to 3 months from now
  const defDate=new Date();defDate.setMonth(defDate.getMonth()+3);
  targetInp.value=fmtDate(defDate);
  targetRow.appendChild(targetInp);
  ww.appendChild(targetRow);

  // Result area — updates on input change
  const wwResult=el('div',{style:'min-height:60px'});
  function updateWWCalc(){
    wwResult.innerHTML='';
    const tgt=targetInp.value;
    if(!tgt)return;
    const tgtDate=new Date(tgt+'T12:00:00');
    const today=new Date();today.setHours(0,0,0,0);
    if(tgtDate<=today){
      wwResult.appendChild(el('div',{style:'color:var(--red);font-size:12px'},'Pick a future date.'));
      return;
    }
    // Count remaining work days (Mon-Sat) between today and target
    let workDaysLeft=0;
    const d=new Date(today);d.setDate(d.getDate()+1);
    while(d<=tgtDate){
      if(ST.workDays.includes(d.getDay())&&!ST.restDays[fmtDate(d)])workDaysLeft++;
      d.setDate(d.getDate()+1);
    }
    const remMin=remMin_all();
    if(!workDaysLeft||!remMin){
      wwResult.appendChild(el('div',{style:'font-size:12px;color:var(--grn)'},'🎉 Nothing left to do!'));
      return;
    }
    const minsPerDay=Math.ceil(remMin/workDaysLeft);
    const hrsPerDay=(minsPerDay/60).toFixed(1);
    const isDoable=minsPerDay<=240; // 4hr cap = ambitious but possible

    const resCard=el('div',{style:'background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:12px 14px'});

    if(!isDoable){
      resCard.appendChild(el('div',{style:'font-size:12px;color:var(--yel);margin-bottom:8px'},'⚠ That\'s a lot — you might want to pick a later date.'));
    }
    const applyBtn=el('button',{class:'btn btn-p',style:'font-size:12px;padding:6px 14px',
      onclick:()=>{
        ST.hoursPerDay=Math.round(minsPerDay/60*4)/4;
        save();render();
        toast('✅ Daily goal updated to '+ST.hoursPerDay+' hrs/day!',true);
      }
    },'Apply — set to '+hrsPerDay+' hrs/day');
    resCard.appendChild(applyBtn);
    wwResult.appendChild(resCard);
  }
  targetInp.oninput=updateWWCalc;
  updateWWCalc();
  ww.appendChild(wwResult);
  w.appendChild(ww);

  const ae=d('card');ae.appendChild(el('div',{class:'ct'},'Adaptive Estimates'));
  ae.appendChild(el('p',{style:'font-size:12px;color:var(--tx2);margin-bottom:12px'},'Recalibrates per-course and per-section-type. Needs 3+ logged sessions per type before adapting.'));
  for(const[cId,c]of Object.entries(COURSES)){
    const lg=allS(cId).filter(s=>ST.logged[s.id]!=null);
    const avg=lg.length?Math.round(lg.reduce((a,s)=>a+ST.logged[s.id],0)/lg.length):null;
    const row=el('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px'});
    row.appendChild(t(c.icon));row.appendChild(el('span',{style:'color:var(--tx2);flex:1'},c.short));
    row.appendChild(el('span',{style:'color:'+(avg?'var(--tx)':'var(--tx3)')},avg?'avg '+avg+' min ('+lg.length+' logged)':'no data yet'));
    ae.appendChild(row);
  }
  w.appendChild(ae);

  const slc=d('card');
  slc.appendChild(el('div',{class:'ct'},'Save & Load'));

  // Cloud sync status
  const syncStatus=el('div',{style:'display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rsm);background:rgba(22,163,90,.08);border:1px solid rgba(22,163,90,.3);margin-bottom:12px;font-size:12px'});
  syncStatus.appendChild(el('span',{style:'font-size:16px'},'☁️'));
  const syncText=el('div',{style:'flex:1'});
  syncText.appendChild(el('div',{style:'font-weight:600;color:var(--tx)'},'Cloud sync active'));
  syncText.appendChild(el('div',{style:'color:var(--tx2);margin-top:1px'},'Progress syncs automatically across all your devices via JSONBin.'));
  syncStatus.appendChild(syncText);
  // Manual sync button
  const syncBtn=el('button',{class:'btn btn-sm',onclick:async()=>{
    syncBtn.textContent='Syncing…';syncBtn.disabled=true;
    await cloudSave();
    syncBtn.textContent='✓ Synced';
    setTimeout(()=>{syncBtn.textContent='Sync now';syncBtn.disabled=false;},2000);
  }},'Sync now');
  syncStatus.appendChild(syncBtn);
  slc.appendChild(syncStatus);

  slc.appendChild(el('p',{style:'font-size:12px;color:var(--tx2);margin-bottom:12px'},'Export your save file before switching to a new version of boopie, then import it in the new version.'));

  // Last save info
  const lastSaveKey='boopie_last_export';
  const lastExport=localStorage.getItem(lastSaveKey);
  if(lastExport){
    const days=Math.floor((Date.now()-parseInt(lastExport))/(1000*60*60*24));

    slc.appendChild(el('div',{style:'font-size:11px;color:var(--tx3);margin-bottom:10px'},'Last export: '+exportAge));
  }

  slc.appendChild(el('div',{class:'row'},
    el('button',{class:'btn btn-g',onclick:()=>{exportSave();localStorage.setItem(lastSaveKey,Date.now().toString());render();}},'💾 Export save file'),
    el('button',{class:'btn',onclick:importSave},'📂 Import save file')
  ));
  w.appendChild(slc);

  return w;
}

    ),
    el('div',{class:'fg'},
      el('label',{class:'il'},'Hours per study day'),
      el('input',{type:'number',class:'inp',min:'0.5',max:'12',step:'0.5',value:tmpHrs,style:'width:120px',oninput:ev=>{tmpHrs=parseFloat(ev.target.value)||1;}})
    ),
    el('div',{style:'display:flex;gap:10px;flex-wrap:wrap;margin-top:8px'},
      el('button',{class:'btn btn-p',style:'font-size:14px;padding:10px 22px',onclick:()=>{
        const thisMonday=new Date().toISOString().slice(0,10);
        ST.lastWeeklyCheck=thisMonday;
        save();render();
      }},'✅ Keep my schedule the same'),
      el('button',{class:'btn',style:'font-size:14px;padding:10px 22px',onclick:()=>{
        const thisMonday=new Date().toISOString().slice(0,10);
        ST.workDays=tmpDays;
        ST.hoursPerDay=tmpHrs;
        ST.lastWeeklyCheck=thisMonday;
        save();render();
        toast('📅 Schedule updated!',true);
      }},'💾 Save changes')
    )
  );
  root.appendChild(el('div',{id:'setup'},card));
}

function renderSetup(){
  const root=document.getElementById('root');root.innerHTML='';
  const form=el('form',{class:'setup-card',onsubmit:ev=>{ev.preventDefault();ST.setupDone=true;save();render();}},
    el('div',{style:'font-size:44px;margin-bottom:14px'},'🎵'),
    el('h1',{style:'font-size:28px;font-weight:800;margin-bottom:6px;line-height:1.1'},el('span',{style:'color:var(--acc)'},'boopie')),
    el('p',{style:'color:var(--tx2);margin-bottom:28px;font-size:14px'},"Let's set up your schedule. Change anything later."),
    el('div',{class:'fg'},
      el('label',{class:'il'},'Which days do you study?'),
      (()=>{const dg=d('dg');['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach((day,i)=>{const chip=el('div',{class:'dc'+(ST.workDays.includes(i)?' on':''),onclick:()=>{if(ST.workDays.includes(i))ST.workDays=ST.workDays.filter(x=>x!==i);else ST.workDays=[...ST.workDays,i].sort();chip.className='dc'+(ST.workDays.includes(i)?' on':'');}},day);dg.appendChild(chip);});return dg;})()
    ),
    el('div',{class:'fg'},
      el('label',{class:'il'},'Total study hours per day (shared across all courses)'),
      el('input',{type:'number',class:'inp',min:'0.5',max:'12',step:'0.5',value:ST.hoursPerDay,style:'width:120px',oninput:ev=>{ST.hoursPerDay=parseFloat(ev.target.value)||1;}})
    ),
    el('div',{class:'hint',style:'margin-bottom:22px'},'✨ Your daily hours are shared proportionally across active courses. Phase 2 unlocks when Theory Essentials is done; Phase 3 when Complete Music Theory is done.'),
    el('button',{type:'submit',class:'btn btn-p',style:'font-size:14px;padding:10px 26px'},"Let's Go! 🚀")
  );
  root.appendChild(el('div',{id:'setup'},form));
}

// ═══ BOOT ═══════════════════════════════════════════════════
(async()=>{
  const root=document.getElementById('root');
  root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)"><div style="text-align:center;color:var(--tx2);font-family:Syne,sans-serif"><div style="font-size:40px;margin-bottom:14px">🎵</div><div style="font-size:14px">Loading your progress\u2026</div></div></div>';
  await load();
  render();
  // Show weekly intention on Monday, reflection on Sunday
  setTimeout(()=>{
    if(shouldShowReflection())showReflectionScreen();
    else if(shouldShowIntention())showIntentionScreen();
  },600);
})();

// Register service worker for offline support
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='mss-v1';
const ASSETS=[self.registration.scope];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const rc=res.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));return res;}).catch(()=>caches.match(e.request)))));
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>

<style>
:root{--bg:#7050c5;--sur:#f5f2ff;--sur-sb:#1a1430;--sur2:#ebe5ff;--sur3:#e2dcf5;--bdr:#c8bfe0;--bdr-sb:#2a2040;--tx:#16112b;--tx2:#4a4070;--tx3:#3d3060;--acc:#7c3aed;--acc2:#5b6ef5;--grn:#16a35a;--yel:#b8860b;--pnk:#c2185b;--red:#c62828;--r:12px;--rsm:8px;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;overflow:hidden;height:100vh}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh}
#topbar{background:var(--sur-sb);border-bottom:1px solid #5b3fa0;box-shadow:0 1px 12px rgba(124,58,237,.45),0 1px 3px rgba(167,139,250,.3);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:50}
#topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#e8e0ff;display:flex;align-items:center;gap:4px}#topbar h1 span{color:#a78bfa}
.tbr{margin-left:auto;display:flex;align-items:center;gap:8px}
.gpill{display:flex;align-items:center;gap:8px;background:#1e1635;border:1px solid #3d2f6a;border-radius:20px;padding:5px 12px;font-size:12px;color:#c4b8f0}
.gpill-bar{width:80px;height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.gpill-fill{height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc));border-radius:3px;transition:width .6s}
@media(max-width:700px){.gpill{padding:4px 8px;font-size:11px}.gpill-bar{width:48px}.tbr-load{display:none!important}.tbr .btn{padding:5px 8px;font-size:11px}}
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;min-width:240px;background:var(--sur-sb);border-right:1px solid #5b3fa0;box-shadow:2px 0 16px rgba(124,58,237,.35),1px 0 4px rgba(167,139,250,.2);overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b5fa0;padding:10px 8px 4px}
.nb{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rsm);cursor:pointer;font-size:15px;font-weight:500;color:#9d8fd0;border:1px solid transparent;transition:all .15s;user-select:none}
.nb:hover{background:#1e1635;color:#e0d8ff}.nb.on{background:#2a1f4a;color:#e8e0ff;border-color:#3d2f6a}
.nbi{font-size:15px;flex-shrink:0;width:18px;text-align:center}.nbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.nbp{font-size:10px;font-weight:700;flex-shrink:0}
.nb-lk{opacity:.35;cursor:default}.nb-lk:hover{background:transparent;color:#9d8fd0}
#content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ct{font-size:15px;font-weight:700;margin-bottom:12px;font-family:'Syne',sans-serif}
.pb{height:7px;background:var(--sur3);border-radius:4px;overflow:hidden}.pf{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.23,1,.32,1)}.pf-glow{}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:12px 14px}
.sv{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.3px}.slb{font-size:11px;color:var(--tx2);margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--sur2);color:var(--tx);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--sur3)}.btn-p{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}.btn-p:hover{opacity:.88}
.btn-g{background:var(--grn);border-color:var(--grn);color:#0c0c0e;font-weight:700}
.btn-sm{padding:4px 10px;font-size:12px}.btn-d{border-color:var(--red);color:var(--red);background:transparent}.btn-d:hover{background:rgba(240,112,112,.1)}
.inp{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);color:var(--tx);padding:7px 11px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--acc)}.il{font-size:12px;color:var(--tx2);display:block;margin-bottom:4px;font-weight:500}.fg{margin-bottom:14px}
.chapter{margin-bottom:6px;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.chh{display:flex;align-items:center;gap:9px;padding:11px 13px;background:var(--sur2);cursor:pointer;user-select:none;transition:background .12s}
.chh:hover{background:var(--sur3)}.cha{color:var(--tx3);font-size:10px;transition:transform .2s;flex-shrink:0}.cha.op{transform:rotate(90deg)}
.cht{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex:1}
#day-panel{position:fixed;top:0;right:0;bottom:0;width:320px;background:var(--sur);border-left:1px solid var(--bdr);box-shadow:-8px 0 32px rgba(0,0,0,.25);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.23,1,.32,1)}
#day-panel.open{transform:translateX(0)}
#day-panel-overlay{position:fixed;inset:0;z-index:199;background:transparent;display:none}
#day-panel-overlay.open{display:block}
.dp-header{padding:18px 18px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dp-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;margin-left:auto;flex-shrink:0}
.dp-close:hover{background:var(--sur3)}
.dp-body{flex:1;overflow-y:auto;padding:14px 18px}
.dp-sec{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--sur2);margin-bottom:7px}
.dp-sec.done{opacity:0.55}
.dp-sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dp-sec-info{flex:1;min-width:0}
.dp-sec-title{font-size:12px;font-weight:500;color:var(--tx);line-height:1.4}
.chbadge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:var(--sur);border:1px solid var(--bdr);color:var(--tx2);flex-shrink:0}
.chbadge.dn{background:rgba(22,163,90,.15);border-color:rgba(22,163,90,.4);color:var(--grn)}.chbody{padding:5px;border-top:1px solid var(--bdr)}
.bulk{font-size:11px;color:var(--acc);cursor:pointer;padding:4px 8px;display:inline-block}.bulk:hover{text-decoration:underline}
.sr{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;transition:background .1s}
.sr:hover{background:var(--sur2)}.sr.dn{opacity:.5}
.ck{width:17px;height:17px;border-radius:5px;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);margin-top:2px}
.ck.on{border-color:var(--grn);background:var(--grn);transform:scale(1.15)}
.ck.on::after{content:'✓';color:#0c0c0e;font-size:10px;font-weight:800;animation:ckpop .2s ease}
@keyframes ckpop{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
.done-ck{width:15px;height:15px;border-radius:4px;border:2px solid var(--grn);background:var(--grn);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.done-ck::after{content:'✓';color:#0c0c0e;font-size:9px;font-weight:800}
.stx{flex:1;font-size:13px}.stx.dn{text-decoration:line-through;color:var(--tx3)}.sti{font-size:10px;margin-right:4px}.rtag{font-size:10px;color:var(--pnk);margin-left:5px}
.se{font-size:11px;color:var(--tx3);white-space:nowrap;margin-top:2px;flex-shrink:0}
.slog{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--tx3);cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;margin-top:1px;transition:all .12s}
.slog:hover{border-color:var(--acc);color:var(--acc)}.slog.lgg{color:var(--grn);border-color:rgba(62,207,142,.4)}
.sli{width:54px;padding:3px 7px;font-size:12px;border-radius:6px;background:var(--sur3);border:1px solid var(--acc);color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;flex-shrink:0}
.row{display:flex;align-items:center;gap:10px}.dg{display:flex;gap:7px;flex-wrap:wrap}
.dc{padding:5px 13px;border-radius:20px;border:1px solid var(--bdr);cursor:pointer;font-size:12px;font-weight:600;background:var(--sur2);color:var(--tx2);transition:all .15s;user-select:none}
.dc.on{background:var(--acc);border-color:var(--acc);color:#0c0c0e}
.eg{display:flex;gap:10px}.ec{flex:1;padding:14px 10px;border-radius:var(--rsm);border:1px solid var(--bdr);cursor:pointer;text-align:center;background:var(--sur2);transition:all .15s;user-select:none}
.ec:hover{border-color:var(--tx3)}.ec.on{border-color:var(--acc);background:rgba(181,123,238,.1)}
.ee{font-size:26px;display:block;margin-bottom:5px}.elbl{font-size:12px;font-weight:600;color:var(--tx2)}
.vr{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:6px;cursor:pointer;transition:all .12s;margin-bottom:2px}
.vr:hover{background:var(--sur2)}.vr.dn{opacity:.45}
#toasts{position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:#1a1430;border:1px solid #3d2f6a;border-radius:var(--r);padding:11px 16px;font-size:13px;color:#e8e0ff;box-shadow:0 6px 28px rgba(0,0,0,.7);max-width:310px;animation:tin .3s ease}
.toast.cel{border-color:#a78bfa;background:#1e1440}.toast.big{border-color:var(--yel);background:#1a1430;font-size:14px;font-weight:600;color:#fde68a}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.cbit{position:fixed;width:7px;height:7px;border-radius:2px;animation:cfal linear forwards;pointer-events:none;z-index:9999}
@keyframes cfal{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}
#setup{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 25% 15%,rgba(181,123,238,.14) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(123,140,248,.09) 0%,transparent 55%),var(--bg);padding:20px}
.setup-card{background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:38px;max-width:540px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.hint{background:rgba(181,123,238,.08);border:1px solid rgba(181,123,238,.2);border-radius:var(--rsm);padding:11px 13px;font-size:12px;color:var(--tx2)}
.hprog{background:linear-gradient(135deg,#ffffff,#f0ebff);border:1px solid rgba(124,58,237,.25);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(124,58,237,.1)}
.mtog{display:flex;background:var(--sur2);padding:3px;border-radius:8px;border:1px solid var(--bdr)}
.mtb{flex:1;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;text-align:center;color:var(--tx2);transition:all .15s;user-select:none}
.mtb.on{background:var(--sur3);color:var(--tx)}
.pie-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ts-sec{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:var(--rsm);margin-bottom:4px;border:1px solid var(--bdr);background:var(--sur2);transition:all .15s;cursor:pointer}
.ts-sec.dn{opacity:.5;background:var(--sur)}.ts-sec:hover{border-color:var(--tx3)}
.ts-title{font-size:13px;font-weight:500}.ts-title.dn{text-decoration:line-through;color:var(--tx3)}.ts-meta{font-size:11px;color:var(--tx3);margin-top:1px}
.da-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;font-size:12px;color:var(--tx2)}
.da-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ub{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.25);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--tx2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
#day-cel{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px}
.day-cel-card{background:var(--sur);border:2px solid var(--yel);border-radius:20px;padding:40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 60px rgba(245,200,66,.25)}
@media(max-width:900px){#sidebar{width:200px;min-width:200px}}
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur-sb);border-top:1px solid var(--bdr-sb);padding:6px 2px;padding-bottom:calc(6px + env(safe-area-inset-bottom));z-index:100;gap:0;flex-direction:row}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:var(--rsm);cursor:pointer;border:none;background:transparent;color:#6b5fa0;font-family:"DM Sans",sans-serif;font-size:9px;font-weight:500;transition:color .15s;-webkit-tap-highlight-color:transparent;min-width:0;overflow:hidden}
.mn-btn.on{color:#a78bfa}.mn-btn-icon{font-size:18px;line-height:1}
@media(max-width:700px){
  html,body{overflow-x:hidden}
  #app{max-width:100vw;overflow-x:hidden}
  #sidebar{display:none}
  #content{padding:12px;padding-bottom:calc(68px + env(safe-area-inset-bottom));overflow-x:hidden;box-sizing:border-box;width:100%}
  #topbar{padding:0 12px;padding-top:env(safe-area-inset-top);height:calc(52px + env(safe-area-inset-top))}
  #mobile-nav{display:flex !important}
  .sg{grid-template-columns:repeat(2,1fr)}
  .btn{padding:9px 14px}
  #day-panel{width:100vw;max-width:100vw}
  .card{overflow-x:hidden}
  table,pre{max-width:100%;overflow-x:auto}
}
</style>

<script>

    {title:'4 – Creating Parts & MIDI FX',secs:[LOR(),WI(4),s('Browsing & Selecting Instruments'),s('Patch Merging'),s('Smart Controls'),s('Overview'),s('Arpeggiator'),s('Chord Trigger'),s('Transposer'),s('Chaining MIDI FX'),s('The Volume Envelope'),s('The Filter'),s('Folder & Summing Stacks'),s('MIDI FX & Refining Sounds',20,'exercise'),QZ('Quiz'),QZ('Week 4 Quiz')]},

// ═══ PHASE LOGIC ═══════════════════════════════════════════
function isUnlocked(cId){const c=COURSES[cId];if(!c.unlockAfter)return true;return coreS(c.unlockAfter).every(s=>ST.completed[s.id]);}
function activeCourses(){return Object.keys(COURSES).filter(cId=>isUnlocked(cId)&&cprog(cId)<1);}

// ═══ CALCULATIONS ══════════════════════════════════════════
function fmt(m){if(!m&&m!==0)return'—';if(m<60)return m+' min';const h=Math.floor(m/60),mn=m%60;if(!mn)return h+' hr'+(h>1?'s':'');return h+' hr'+(h>1?'s':'')+' '+mn+' min';}
function fmtH(h){if(h<1)return Math.round(h*60)+' min';return h.toFixed(1)+' hrs';}
function adapt(cId,tp){const secs=allS(cId).filter(s=>ST.logged[s.id]!=null);const typed=secs.filter(s=>s.tp===tp);if(typed.length>=3)return Math.round(typed.reduce((a,s)=>a+ST.logged[s.id],0)/typed.length);if(secs.length>=3)return Math.round(secs.reduce((a,s)=>a+ST.logged[s.id],0)/secs.length);return null;}
function est(sec){const a=adapt(sec.cId,sec.tp);return a!=null?a:sec.m;}
function remMin(cId){return allS(cId).filter(s=>!s.ir&&!ST.completed[s.id]).reduce((a,s)=>a+est(s),0);}
function doneMin(cId){return coreS(cId).filter(s=>ST.completed[s.id]).reduce((a,s)=>a+est(s),0);}
function cprog(cId){const cs=coreS(cId);if(!cs.length)return 0;return cs.filter(s=>ST.completed[s.id]).length/cs.length;}
function gprog(){const cs=coreS();if(!cs.length)return 0;return cs.filter(s=>ST.completed[s.id]).length/cs.length;}

function courseHrsPerDay(cId){
  const active=activeCourses();
  if(!active.includes(cId))return 0;
  const totalRem=active.reduce((a,c)=>a+remMin(c),0);
  if(!totalRem)return 0;
  return ST.hoursPerDay*(remMin(cId)/totalRem);
}

function wdUntil(ds){if(!ds)return null;const tgt=new Date(ds);tgt.setHours(23,59,0,0);const now=new Date();now.setHours(0,0,0,0);let c=0;const d=new Date(now);while(d<=tgt){if(ST.workDays.includes(d.getDay()))c++;d.setDate(d.getDate()+1);}return c;}

function dlFromPool(cId){
  const hpd=courseHrsPerDay(cId);if(!hpd)return'—';
  const rem=remMin(cId);const dn=Math.ceil((rem/60)/hpd);
  let c=0;const d=new Date();
  while(c<dn){d.setDate(d.getDate()+1);if(ST.workDays.includes(d.getDay()))c++;}
  return d.toISOString().slice(0,10);
}

function cascadeFinish(cId){
  if(isUnlocked(cId)){
    const dl=dlFromPool(cId);
    return{deadline:dl||'—',hpdStr:csched(cId).hpdStr,locked:false};
  }
  const prereqId=COURSES[cId].unlockAfter;
  if(!prereqId)return{deadline:dlFromPool(cId)||'—',hpdStr:'—',locked:false};
  // Get prereq finish date
  let prereqDl;
  if(cprog(prereqId)>=1){
    // prereq already done — locked course can start now
    prereqDl=new Date().toISOString().slice(0,10);
  }else if(isUnlocked(prereqId)){
    prereqDl=dlFromPool(prereqId)||'—';
  }else{
    prereqDl=cascadeFinish(prereqId).deadline;
  }
  if(!prereqDl||prereqDl==='—')return{deadline:'—',hpdStr:'—',locked:true};
  const rem=remMin(cId);
  if(!rem)return{deadline:prereqDl,hpdStr:'—',locked:true};
  const dn=Math.ceil((rem/60)/ST.hoursPerDay);
  let c=0;const dt=new Date(prereqDl);
  while(c<dn){dt.setDate(dt.getDate()+1);if(ST.workDays.includes(dt.getDay()))c++;}
  return{deadline:dt.toISOString().slice(0,10),hpdStr:ST.hoursPerDay,locked:true};
}


function globalDl(){
  // Use cascadeFinish for locked courses so phases are sequential, not simultaneous
  const dls=Object.keys(COURSES).map(cId=>{
    if(cprog(cId)>=1)return null;
    return isUnlocked(cId)?dlFromPool(cId):cascadeFinish(cId).deadline;
  }).filter(d=>d&&d!=='—');
  if(!dls.length)return null;dls.sort();return dls[dls.length-1];
}

function hrsFromDeadline(){const rem=remMin();const days=wdUntil(ST.deadline);if(!days||days<=0)return'—';return(rem/60/days).toFixed(1);}

function csched(cId){
  const dl=ST.courseDeadlines[cId];
  if(dl){const days=wdUntil(dl);const rem=remMin(cId);const hpd=(!days||days<=0)?'—':(rem/60/days).toFixed(1);return{deadline:dl,hpdStr:hpd};}
  const hpd=courseHrsPerDay(cId);
  return{deadline:dlFromPool(cId),hpdStr:hpd?hpd.toFixed(1):0};
}

function buildSession(){
  const targetMin=todayGoalMin();
  const active=activeCourses();
  if(!active.length)return[];
  const totalRem=active.reduce((a,c)=>a+remMin(c),0);
  const allocs={};active.forEach(cId=>{allocs[cId]=Math.round(targetMin*(totalRem?remMin(cId)/totalRem:1/active.length));});
  const session=[];
  for(const cId of active){
    let budget=allocs[cId];
    outer:for(const ch of COURSES[cId].chapters){
      for(const sec of ch.secs){
        if(sec.ir||ST.completed[sec.id])continue;
        if(budget<=0)break outer;
        session.push({secId:sec.id,cId,title:sec.t,estMin:est(sec),tp:sec.tp});
        budget-=est(sec);
      }
    }
  }
  return session;
}

  if(ST.completed[secId]){
    if(logMin&&logMin>0)ST.logged[secId]=logMin;
    if(!ST.dailyDone[key].includes(secId))ST.dailyDone[key].push(secId);

    const wasCrabDay=todayHasCrab();
    markCrabDay();

    if(surprise)newRewards.push(surprise);
    if(newRewards.length)setTimeout(()=>showRewardCel(newRewards[0]),1400);
    const ch=COURSES[sec.cId].chapters[sec.ci];
    if(ch.secs.every(s=>ST.completed[s.id]))setTimeout(()=>{const cm=['🎊 WHOLE CHAPTER DONE! That is seriously impressive.','🥳 Chapter complete! Take a breath — you earned it.','💪 You just knocked out a full chapter. How good does that feel?!'];toast(cm[Math.floor(Math.random()*cm.length)],true);confetti();},700);

      setTimeout(()=>{Object.keys(COURSES).forEach(cId=>{if(isUnlocked(cId)&&cprog(cId)<1&&COURSES[cId].unlockAfter===sec.cId)toast('🔓 '+COURSES[cId].name+' is now unlocked and waiting for you!',true,true);});},2200);
    }

function toggleCh(cId,ci){
  const secs=COURSES[cId].chapters[ci].secs;const allDone=secs.every(s=>ST.completed[s.id]);
  const key=todayKey();if(!ST.dailyDone[key])ST.dailyDone[key]=[];

}

// ═══ DOM HELPERS ════════════════════════════════════════════
let editLog=null;
function el(tag,props){
  const node=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='class')node.className=v;else if(k==='style')node.style.cssText=v;
    else if(k.startsWith('on'))node.addEventListener(k.slice(2).toLowerCase(),v);
    else node.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];if(c==null)continue;
    if(typeof c==='string'||typeof c==='number')node.appendChild(document.createTextNode(String(c)));
    else node.appendChild(c);
  }
  return node;
}
// SVG-namespace element creator (required for SVG children to render)
function svgEl(tag,props){
  const NS='http://www.w3.org/2000/svg';
  const node=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='style')node.style.cssText=v;
    else node.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i];if(c==null)continue;
    if(typeof c==='string'||typeof c==='number')node.appendChild(document.createTextNode(String(c)));
    else node.appendChild(c);
  }
  return node;
}
function d(cls){const args=['div',{class:cls}];for(let i=1;i<arguments.length;i++)args.push(arguments[i]);return el.apply(null,args);}
function t(txt){const e=document.createElement('span');e.textContent=txt;return e;}
function pb(pct,color,h){h=h||7;const bar=d('pb');bar.style.height=h+'px';const fill=d('pf');fill.style.width=(Math.min(pct,1)*100).toFixed(1)+'%';fill.style.background=color;bar.appendChild(fill);return bar;}
function sc(val,label,color){return el('div',{class:'sc'},el('div',{class:'sv',style:color?'color:'+color:''},val),el('div',{class:'slb'},label));}

function skipS(secId){
  // Mark as skipped+completed, add to daily done
  const sec=allS().find(s=>s.id===secId);if(!sec)return;
  ST.skipped[secId]=true;
  ST.completed[secId]=true;

// ═══ PIE CHART ══════════════════════════════════════════════
function makePie(segments,size){
  size=size||110;
  const total=segments.reduce((a,s)=>a+s.value,0);
  const svg=el('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size,style:'flex-shrink:0'});
  if(!total){svg.appendChild(el('circle',{cx:size/2,cy:size/2,r:size/2-4,fill:'var(--sur3)'}));return svg;}
  const cx=size/2,cy=size/2,r=size/2-4,ir=r*.55;let angle=-Math.PI/2;
  for(const seg of segments){
    if(!seg.value)continue;
    const sw=(seg.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sw),y2=cy+r*Math.sin(angle+sw);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+sw),iy2=cy+ir*Math.sin(angle+sw);
    const lg=sw>Math.PI?1:0;
    svg.appendChild(el('path',{d:'M '+ix1+' '+iy1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+ix2+' '+iy2+' A '+ir+' '+ir+' 0 '+lg+' 0 '+ix1+' '+iy1+' Z',fill:seg.color,stroke:'var(--sur)','stroke-width':'2'}));
    angle+=sw;
  }
  return svg;
}

// Section milestone finds: every N core sections
const SECTION_MILESTONES=[
  {at:10,reward:'starfish1'},{at:20,reward:'shell1'},{at:30,reward:'pebble1'},
  {at:40,reward:'starfish2'},{at:50,reward:'shell2'},{at:65,reward:'pebble2'},
  {at:80,reward:'starfish3'},{at:100,reward:'pebble3'},
];

// Hat rewards per course completion
const COURSE_HATS={
  production:'hat_pirate',
  theory_ess:'hat_captain',
  remix:'hat_wizard',
  theory_comp:'hat_pearl',
  adv_comp:'hat_crown',
};

// Check and award any newly earned rewards, return array of new ones
function checkRewards(){
  const earned=ST.rewards||[];
  const has=id=>earned.some(r=>r.id===id);
  const newOnes=[];
  function award(id,ctx){if(!has(id)){earned.push({id,earnedAt:new Date().toISOString(),ctx:ctx||''});newOnes.push(id);}}

  // Section milestones
  const doneCore=coreS().filter(s=>ST.completed[s.id]).length;
  for(const m of SECTION_MILESTONES){if(doneCore>=m.at)award(m.reward,'section_'+m.at);}

  // Chapter completions → treasure rotation
  const treasureIds=['coin1','gem1','gem2','key1','orb1','coin2','gem3','chest1'];
  let chaptersDone=0;
  for(const[cId,c]of Object.entries(COURSES)){
    for(const ch of c.chapters){
      const allDone=ch.secs.length>0&&ch.secs.every(s=>ST.completed[s.id]);
      if(allDone)chaptersDone++;
    }
  }
  // Award treasures sequentially as chapters are completed
  for(let i=0;i<Math.min(chaptersDone,treasureIds.length);i++){
    award(treasureIds[i],'chapter_'+(i+1));
  }

  // Course completions → hats
  for(const[cId,hat]of Object.entries(COURSE_HATS)){
    if(coreS(cId).length>0&&coreS(cId).every(s=>ST.completed[s.id]))award(hat,'course_'+cId);
  }

  // Surprise: ~1 in 12 chance on any section complete — awarded randomly
  // (handled in toggleS, not here)

  ST.rewards=earned;
  return newOnes;
}

function maybeSurprise(){
  const surpriseIds=['bottle1','fish1','chest2','seahorse1'];
  const earned=ST.rewards||[];
  const unearned=surpriseIds.filter(id=>!earned.some(r=>r.id===id));
  if(!unearned.length)return null;
  if(Math.random()<1/12){
    const id=unearned[Math.floor(Math.random()*unearned.length)];
    earned.push({id,earnedAt:new Date().toISOString(),ctx:'surprise'});
    ST.rewards=earned;
    return id;
  }
  return null;
}

function earnedHat(){
  const hats=Object.values(COURSE_HATS);
  const earned=ST.rewards||[];
  // Return the most prestigious earned hat (last in list = most prestigious)
  for(let i=hats.length-1;i>=0;i--){
    if(earned.some(r=>r.id===hats[i]))return hats[i];
  }
  return null;
}

// ═══ HISTORY / PROGRESS REVIEW ══════════════════════════════
function vHistory(){
  const w=d('');
  w.appendChild(el('h2',{style:'font-family:Syne,sans-serif;font-size:26px;font-weight:800;margin-bottom:3px'},'📋 My Progress'));
  w.appendChild(el('p',{style:'color:var(--tx);font-size:13px;margin-bottom:16px'},'Every section you\'ve completed or skipped, organised by course.'));

  // Filter tabs
  let activeFilter=ST._historyFilter||'all';
  const filterBar=el('div',{style:'display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap'});
  [{k:'all',l:'All'},{k:'completed',l:'✓ Completed'},{k:'skipped',l:'⏭ Skipped'},{k:'remaining',l:'⬜ Remaining'}].forEach(({k,l})=>{
    filterBar.appendChild(el('button',{
      class:'btn btn-sm'+(activeFilter===k?' btn-p':''),
      style:activeFilter===k?'':'',
      onclick:()=>{ST._historyFilter=k;render();}
    },l));
  });
  w.appendChild(filterBar);

  // Stats row
  const totalCore=coreS().length;
  const totalDone=coreS().filter(s=>ST.completed[s.id]).length;
  const totalSkipped=Object.keys(ST.skipped).length;
  const totalRem=totalCore-totalDone;
  const statsRow=el('div',{style:'display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap'});
  [{v:totalDone,l:'Completed',c:'var(--grn)'},{v:totalSkipped,l:'Skipped',c:'var(--yel)'},{v:totalRem,l:'Remaining',c:'var(--tx3)'}].forEach(({v,l,c})=>{
    const b=el('div',{style:'background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:6px'});
    b.appendChild(el('span',{style:'font-size:16px;font-weight:700;color:'+c},v+''));
    b.appendChild(el('span',{style:'color:var(--tx2)'},l));
    statsRow.appendChild(b);
  });
  w.appendChild(statsRow);

  // Sections by course
  for(const[cId,course]of Object.entries(COURSES)){
    const allSecs=coreS(cId);
    if(!allSecs.length)continue;

    // Filter sections
    let secs=allSecs;
    if(activeFilter==='completed')secs=allSecs.filter(s=>ST.completed[s.id]);
    else if(activeFilter==='skipped')secs=allSecs.filter(s=>ST.skipped[s.id]);
    else if(activeFilter==='remaining')secs=allSecs.filter(s=>!ST.completed[s.id]&&!ST.skipped[s.id]);
    if(!secs.length)continue;

    const doneCt=allSecs.filter(s=>ST.completed[s.id]).length;
    const pct=Math.round(doneCt/allSecs.length*100);
    const locked=!isUnlocked(cId);

    const courseCard=el('div',{style:'background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:12px;overflow:hidden'});

    // Course header
    const ch=el('div',{style:'padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;background:'+course.color+'11'});
    ch.appendChild(el('span',{style:'font-size:18px'},course.icon));
    ch.appendChild(el('div',{style:'flex:1;min-width:0'},
      el('div',{style:'font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:var(--tx)'},course.name+(locked?' 🔒':'')),
      el('div',{style:'font-size:11px;color:var(--tx2);margin-top:1px'},doneCt+' / '+allSecs.length+' sections · '+pct+'% done')
    ));
    // Mini progress bar
    const mpb=el('div',{style:'width:80px;height:6px;background:var(--sur3);border-radius:3px;overflow:hidden;flex-shrink:0'});
    const mpf=el('div',{style:'height:100%;background:'+course.color+';border-radius:3px;width:'+pct+'%'});
    mpb.appendChild(mpf);ch.appendChild(mpb);
    courseCard.appendChild(ch);

    // Section list
    const secList=el('div',{style:'padding:8px 12px;display:flex;flex-direction:column;gap:4px'});
    for(const sec of secs){
      const isDone=!!ST.completed[sec.id];
      const isSkip=!!ST.skipped[sec.id];
      const diff=ST.sectionDifficulty&&ST.sectionDifficulty[sec.id];
      const diffLabel={easy:'⚡',ok:'😊',hard:'😓'}[diff]||'';
      const loggedMin=ST.logged[sec.id];

      const row=el('div',{style:'display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:var(--rsm);'+(isDone?'opacity:0.85':'')});

      // Status icon
      if(isDone&&!isSkip){
        row.appendChild(el('span',{class:'done-ck',style:'flex-shrink:0'}));
      }else if(isSkip){
        row.appendChild(el('span',{style:'width:15px;height:15px;border-radius:4px;border:2px solid var(--yel);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--yel);font-weight:700'},'⏭'));
      }else{
        row.appendChild(el('span',{style:'width:15px;height:15px;border-radius:4px;border:2px solid var(--bdr);display:inline-flex;flex-shrink:0'}));
      }

      // Title
      const titleEl=el('span',{style:'flex:1;font-size:12px;color:'+(isDone?'var(--tx2)':isSkip?'var(--tx3)':'var(--tx)')+(isDone&&!isSkip?';text-decoration:line-through':'')},sec.t);
      row.appendChild(titleEl);

      // Difficulty tag
      if(diffLabel)row.appendChild(el('span',{title:'Difficulty: '+diff,style:'font-size:12px'},diffLabel));

      // Time
      const timeStr=loggedMin?loggedMin+'min':est(sec)+'min';
      row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);flex-shrink:0'},timeStr));

      // Undo/action button
      if(isDone&&!isSkip){
        row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);cursor:pointer;flex-shrink:0',onclick:()=>toggleS(sec.id,null)},'undo'));
      }else if(isSkip){
        row.appendChild(el('span',{style:'font-size:10px;color:var(--acc);cursor:pointer;flex-shrink:0',onclick:()=>unskipS(sec.id)},'↩ restore'));
      }

      secList.appendChild(row);
    }
    courseCard.appendChild(secList);
    w.appendChild(courseCard);
  }

  return w;
}

// ═══ CRAB STREAK ════════════════════════════════════════════
// A "crab day" = at least one core section completed that day
// Weekdays (Mon-Fri) are required. Sat/Sun extend the streak as bonus.
function markCrabDay(){
  if(!ST.crabDays)ST.crabDays={};
  const k=todayKey();
  if(!ST.crabDays[k]){ST.crabDays[k]=true;save();}
}

function crabStreak(){
  if(!ST.crabDays)return 0;
  const today=new Date();today.setHours(0,0,0,0);
  let streak=0;
  const d=new Date(today);
  // Include today if already a crab day
  while(true){
    const k=fmtDate(d);
    const isSun=d.getDay()===0;
    const isWeekend=d.getDay()===0||d.getDay()===6;
    const hasCrab=!!ST.crabDays[k];
    if(isSun&&!hasCrab){
      // Sunday without a crab is skipped (doesn't break or extend)
      d.setDate(d.getDate()-1);
      if(d<new Date(today).setDate(today.getDate()-365))break;
      continue;
    }
    if(isWeekend&&!hasCrab){
      // Saturday without a crab — skip but don't break
      d.setDate(d.getDate()-1);
      continue;
    }
    if(!isWeekend&&!hasCrab){
      // Weekday with no crab — streak broken
      break;
    }
    streak++;
    d.setDate(d.getDate()-1);
    if(streak>365)break;
  }
  return streak;
}

function todayHasCrab(){
  return !!(ST.crabDays&&ST.crabDays[todayKey()]);
}

// ═══ MOMENTUM SCORE ═════════════════════════════════════════
function momentumScore(){
  const today=new Date();today.setHours(0,0,0,0);
  function minsForWeek(weeksAgo){
    let total=0;
    const d=new Date(today);
    d.setDate(d.getDate()-(weeksAgo*7));
    for(let i=0;i<7;i++){
      const k=fmtDate(d);
      const ids=ST.dailyDone[k]||[];
      total+=ids.reduce((a,id)=>{const s=allS().find(s=>s.id===id);return a+(s?est(s):0);},0);
      d.setDate(d.getDate()+1);
    }
    return total;
  }
  const thisWeek=minsForWeek(0);
  const lastWeek=minsForWeek(1);
  if(!lastWeek&&!thisWeek)return null;
  if(!lastWeek)return{pct:100,dir:'up',thisWeek,lastWeek};
  const pct=Math.round(((thisWeek-lastWeek)/lastWeek)*100);
  return{pct:Math.abs(pct),dir:pct>=0?'up':'down',thisWeek,lastWeek};
}

  const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const mon=new Date(d);mon.setDate(diff);

// Is a given date a work day (based purely on user's workDays setting)
function remMin_all(){
  return Object.keys(COURSES).reduce((a,cId)=>a+remMin(cId),0);
}

function isWorkDay(date){
  return ST.workDays.includes(date.getDay());
}

// Format date as YYYY-MM-DD using LOCAL time (avoids UTC timezone shift)
function fmtDate(d){
  const yr=d.getFullYear();
  const mo=(d.getMonth()+1).toString().padStart(2,'0');
  const dy=d.getDate().toString().padStart(2,'0');
  return yr+'-'+mo+'-'+dy;
}

// Adaptive daily goal: if 7+ active days, suggest avg actual minutes
function adaptiveGoalMin(){
  const active=Object.keys(ST.dailyDone).filter(k=>ST.dailyDone[k]&&ST.dailyDone[k].length>0);
  if(active.length<7)return ST.hoursPerDay*60;
  const totalMin=active.reduce((a,k)=>{
    const ids=ST.dailyDone[k]||[];
    return a+ids.reduce((b,id)=>{const s=allS().find(s=>s.id===id);return b+(s?est(s):0);},0);
  },0);
  return Math.round(totalMin/active.length);
}

// Check if adaptive suggestion differs significantly from current goal
function adaptiveSuggestion(){
  const active=Object.keys(ST.dailyDone).filter(k=>ST.dailyDone[k]&&ST.dailyDone[k].length>0);
  if(active.length<7)return null;
  const avgMin=adaptiveGoalMin();
  const currentMin=ST.hoursPerDay*60;
  if(Math.abs(avgMin-currentMin)>15)return avgMin; // suggest if >15min difference
  return null;
}

// Build the forward plan: for each future work day, assign sections proportionally across courses
function buildCalendarPlan(){
  const today=new Date();today.setHours(0,0,0,0);
  const todayKey2=fmtDate(today);
  const goalMin=adaptiveGoalMin();

  function getCourseRemaining(cId){
    const course=COURSES[cId];const secs=[];
    for(const ch of course.chapters)for(const sec of ch.secs)
      if(!sec.ir&&!ST.completed[sec.id]&&!ST.skipped[sec.id])
        secs.push({...sec,cId,courseName:course.short,color:course.color});
    return secs;
  }

  // Group by phase — include ALL courses, locked or not
  const byPhase={1:[],2:[],3:[]};
  for(const[cId,course]of Object.entries(COURSES)){
    const secs=getCourseRemaining(cId);
    if(secs.length)byPhase[course.phase].push({cId,secs,course});
  }

  const totalRemMin=[1,2,3].flatMap(ph=>byPhase[ph]).reduce((a,{secs})=>a+secs.reduce((b,s)=>b+est(s),0),0);
  if(!totalRemMin)return[];

  const workDaysNeeded=Math.ceil((totalRemMin/60)/(goalMin/60));
  const maxCalDays=workDaysNeeded*3+180;

  const cursors={};
  for(const ph of[1,2,3])for(const{cId}of byPhase[ph])cursors[cId]=0;

  const phaseExhausted=ph=>byPhase[ph].every(({cId,secs})=>cursors[cId]>=secs.length);
  const allExhausted=()=>[1,2,3].every(ph=>phaseExhausted(ph));

  const plan=[];
  const d2=new Date(today);
  let currentPhase=1;

  for(let i=0;i<maxCalDays&&!allExhausted();i++){
    const dateStr=fmtDate(d2);
    const isRest=!!(ST.restDays&&ST.restDays[dateStr]);
    const isWork=isWorkDay(d2);
    const isSun=d2.getDay()===0;

    if(!isWork||isRest){
      plan.push({date:dateStr,isRest,isSunday:isSun,isWorkDay:isWork,sections:[],goalMin:0,skip:true});
      d2.setDate(d2.getDate()+1);continue;
    }

    const isPast=dateStr<todayKey2;
    const customGoal=(ST.todayCommitHrs&&ST.todayCommitHrs[dateStr])?ST.todayCommitHrs[dateStr]*60:goalMin;

    if(isPast){
      const actualIds=ST.dailyDone[dateStr]||[];
      const actualMin=actualIds.reduce((a,id)=>{const s=allS().find(s=>s.id===id);return a+(s?est(s):0);},0);
      const doneSecs=actualIds.map(id=>allS().find(s=>s.id===id)).filter(Boolean).filter(s=>!s.ir);
      const goalMet=actualMin>=customGoal*0.8;
      plan.push({date:dateStr,isPast:true,isWorkDay:true,sections:doneSecs.map(s=>({...s,cId:s.cId,courseName:COURSES[s.cId]?.short,color:COURSES[s.cId]?.color})),actualMin,goalMin:customGoal,goalMet,skip:false});
      d2.setDate(d2.getDate()+1);continue;
    }

    // Advance phase when current is exhausted
    while(currentPhase<3&&phaseExhausted(currentPhase))currentPhase++;

    const activeCourses=byPhase[currentPhase].filter(({cId,secs})=>cursors[cId]<secs.length);
    const daySecs=[];
    if(activeCourses.length){
      const totalLeft=activeCourses.reduce((a,{cId,secs})=>a+secs.slice(cursors[cId]).reduce((b,s)=>b+est(s),0),0);
      for(const{cId,secs}of activeCourses){
        const courseRem=secs.slice(cursors[cId]).reduce((a,s)=>a+est(s),0);
        const share=Math.round(customGoal*(courseRem/totalLeft));
        let courseFilled=0;
        while(cursors[cId]<secs.length&&courseFilled<share){
          const sec=secs[cursors[cId]];const m=est(sec);
          if(courseFilled+m>share*1.1&&courseFilled>0)break;
          daySecs.push(sec);courseFilled+=m;cursors[cId]++;
        }
      }
    }
    plan.push({date:dateStr,isPast:false,isToday:dateStr===todayKey2,isWorkDay:true,isSunday:isSun,sections:daySecs,goalMin:customGoal,skip:false,phase:currentPhase});
    d2.setDate(d2.getDate()+1);
  }
  return plan;
}

function renderMobileCalendar(w,plan){
  // Week-at-a-time view — state stored in a container div
  const today=fmtDate(new Date());

  // Find which week index we're on (0 = current week)
  // Use a mutable ref stored on the container
  const container=el('div',{});

  // Get Monday of current week
  function getMondayOf(dateStr){
    const d=new Date(dateStr+'T12:00:00');
    const day=d.getDay();
    const diff=day===0?-6:1-day;
    const mon=new Date(d);mon.setDate(d.getDate()+diff);
    return fmtDate(mon);
  }

  const todayMon=getMondayOf(today);
  let weekOffset=0; // 0 = current week

  function renderWeek(){
    container.innerHTML='';

    // Compute Monday of displayed week
    const baseMon=new Date(todayMon+'T12:00:00');
    baseMon.setDate(baseMon.getDate()+weekOffset*7);
    const weekDates=[];
    for(let i=0;i<7;i++){
      const d=new Date(baseMon);d.setDate(baseMon.getDate()+i);
      weekDates.push(fmtDate(d));
    }

    // Week nav header
    const nav=el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px'});
    const prevBtn=el('button',{class:'btn btn-sm',onclick:()=>{weekOffset--;renderWeek();}},'← Prev');
    const weekLabel=el('div',{style:'font-size:13px;font-weight:700;color:var(--tx);text-align:center'});
    const startDt=new Date(weekDates[0]+'T12:00:00');
    const endDt=new Date(weekDates[6]+'T12:00:00');
    weekLabel.textContent=startDt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+endDt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const nextBtn=el('button',{class:'btn btn-sm',onclick:()=>{weekOffset++;renderWeek();}},weekOffset<0?'Next →':'Next →');
    if(weekOffset===0)prevBtn.style.opacity='0.35';
    nav.appendChild(prevBtn);nav.appendChild(weekLabel);nav.appendChild(nextBtn);
    container.appendChild(nav);

    // Day grid — 7 cols, big cells
    const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
    const hdr=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px'});
    DAYS.forEach(dn=>hdr.appendChild(el('div',{style:'font-size:10px;font-weight:700;text-align:center;color:var(--tx2);padding:2px 0'},dn)));
    container.appendChild(hdr);

    const grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px'});
    weekDates.forEach(dateStr=>{
      const dt=new Date(dateStr+'T12:00:00');
      const isSun=dt.getDay()===0;
      const isToday=dateStr===today;
      const isPast=dateStr<today;
      const isRest=!!(ST.restDays&&ST.restDays[dateStr]);
      const isUserWorkDay=ST.workDays.includes(dt.getDay());
      const dayPlan=plan.find(p=>p.date===dateStr);
      const hasSecs=dayPlan&&!dayPlan.skip&&dayPlan.sections&&dayPlan.sections.length>0;
      const doneSecs=dayPlan&&dayPlan.isPast&&dayPlan.sections&&dayPlan.sections.length>0;

      let bg='var(--sur)';let border='var(--bdr)';let op='1';
      if(isSun||!isUserWorkDay){bg='var(--sur2)';op='0.5';}
      else if(isRest){bg='var(--sur2)';op='0.65';}
      if(isToday)border='var(--acc)';
      if(dayPlan?.isPast&&dayPlan?.goalMet)border='var(--grn)';
      if(dayPlan?.isPast&&!dayPlan?.goalMet&&dayPlan?.sections?.length)border='var(--yel)';

      const cell=el('div',{
        style:`background:${bg};border:2px solid ${border};border-radius:var(--rsm);padding:5px 3px;min-height:70px;opacity:${op};display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;gap:2px`,
        onclick:()=>openDayPanel(dayPlan,dateStr)
      });

      // Date number
      cell.appendChild(el('div',{style:`font-size:13px;font-weight:${isToday?'800':'600'};color:${isToday?'var(--acc)':isPast?'var(--tx2)':'var(--tx)'}`},dt.getDate()+''));

      if(isRest){
        cell.appendChild(el('div',{style:'font-size:14px;line-height:1'},'🌙'));
      }else if(isSun||!isUserWorkDay){
        // greyed
      }else if(hasSecs||doneSecs){
        // Course colour dots
        const byCourse={};
        (dayPlan.sections||[]).forEach(s=>{if(s.cId&&COURSES[s.cId])byCourse[s.cId]=COURSES[s.cId].color;});
        const colors=Object.values(byCourse).slice(0,3);
        const dotRow=el('div',{style:'display:flex;gap:2px;flex-wrap:wrap;justify-content:center'});
        colors.forEach(c=>dotRow.appendChild(el('div',{style:`width:6px;height:6px;border-radius:50%;background:${c}`})));
        cell.appendChild(dotRow);
        // Total mins
        const totalM=(dayPlan.sections||[]).reduce((a,s)=>a+est(s),0);
        if(totalM)cell.appendChild(el('div',{style:'font-size:9px;color:var(--tx3);text-align:center'},totalM+'m'));
        // Check if done
        if(dayPlan.isPast&&dayPlan.goalMet)cell.appendChild(el('div',{style:'font-size:10px;color:var(--grn);font-weight:700'},'✓'));
      }

      // Rest toggle moon (future work days)
      if(!isSun&&isUserWorkDay&&!isPast){
        const moon=el('div',{
          style:'font-size:10px;opacity:'+(isRest?'1':'0.2')+';cursor:pointer;position:absolute;top:2px;right:2px',
          onclick:(e)=>{e.stopPropagation();if(!ST.restDays)ST.restDays={};if(ST.restDays[dateStr])delete ST.restDays[dateStr];else ST.restDays[dateStr]=true;save();render();}
        },'🌙');
        cell.appendChild(moon);
      }

      grid.appendChild(cell);
    });
    container.appendChild(grid);

    // This week's section list below grid
    const workDays=weekDates.filter(dateStr=>{
      const dt=new Date(dateStr+'T12:00:00');
      return ST.workDays.includes(dt.getDay())&&!(ST.restDays&&ST.restDays[dateStr]);
    });
    const hasAnyPlan=workDays.some(d=>{const p=plan.find(p=>p.date===d);return p&&!p.skip&&p.sections&&p.sections.length;});
    if(hasAnyPlan){
      container.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px'},'This week\'s plan'));
      workDays.forEach(dateStr=>{
        const dayPlan=plan.find(p=>p.date===dateStr);
        if(!dayPlan||dayPlan.skip||!dayPlan.sections||!dayPlan.sections.length)return;
        const dt=new Date(dateStr+'T12:00:00');
        const isToday=dateStr===today;
        const isPast=dateStr<today;
        const dayCard=el('div',{style:'background:var(--sur);border:1px solid '+(isToday?'var(--acc)':'var(--bdr)')+';border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;cursor:pointer',
          onclick:()=>openDayPanel(dayPlan,dateStr)});
        const dayHdr=el('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:6px'});
        dayHdr.appendChild(el('span',{style:'font-size:12px;font-weight:700;color:'+(isToday?'var(--acc)':'var(--tx)')},dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})));
        const byCourse={};(dayPlan.sections||[]).forEach(s=>{if(!byCourse[s.cId])byCourse[s.cId]={name:s.courseName,color:s.color,count:0,mins:0};byCourse[s.cId].count++;byCourse[s.cId].mins+=est(s);});
        for(const[,g]of Object.entries(byCourse)){
          const tag=el('span',{style:`font-size:10px;padding:1px 6px;border-radius:20px;background:${g.color}44;color:${g.color};font-weight:600`});
          tag.textContent=g.count+'×'+Math.round(g.mins/g.count)+'m · '+g.name;
          dayHdr.appendChild(tag);
        }
        const totalM=(dayPlan.sections||[]).reduce((a,s)=>a+est(s),0);
        const hrs=totalM>=60?Math.floor(totalM/60)+'h'+(totalM%60?totalM%60+'m':''):totalM+'m';
        dayHdr.appendChild(el('span',{style:'margin-left:auto;font-size:11px;color:var(--tx3);flex-shrink:0'},hrs));
        dayCard.appendChild(dayHdr);
        if(isPast&&dayPlan.goalMet)dayCard.appendChild(el('div',{style:'font-size:11px;color:var(--grn);font-weight:600'},'✓ Goal met'));
        else if(isPast&&dayPlan.sections.length)dayCard.appendChild(el('div',{style:'font-size:11px;color:var(--yel)'},'⚠ Partial'));
        container.appendChild(dayCard);
      });
    }
  }

  renderWeek();
  w.appendChild(container);
}

function renderDesktopCalendar(w,plan){
  const months={};
  for(const day of plan){
    const dt=new Date(day.date+'T12:00:00');
    const mk=dt.getFullYear()+'-'+(dt.getMonth()+1).toString().padStart(2,'0');
    if(!months[mk])months[mk]=[];
    months[mk].push(day);
  }

  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

  for(const[mk,days]of Object.entries(months)){
    const [yr,mo]=mk.split('-').map(Number);
    const monthEl=el('div',{style:'margin-bottom:24px'});
    monthEl.appendChild(el('div',{style:'font-family:Syne,sans-serif;font-size:16px;font-weight:800;margin-bottom:10px;color:var(--tx)'},MONTHS[mo-1]+' '+yr));

    // Day-of-week headers
    const hdr=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px'});
    DAYS.forEach(dn=>hdr.appendChild(el('div',{style:'font-size:11px;font-weight:700;text-align:center;color:var(--tx2);padding:4px 0'},dn)));
    monthEl.appendChild(hdr);

    // Build 7-col grid starting from the first day of the month
    const firstOfMonth=new Date(yr,mo-1,1);
    const startPad=firstOfMonth.getDay(); // 0=Sun offset
    const grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:3px'});

    // Empty cells before month start
    for(let i=0;i<startPad;i++){
      grid.appendChild(el('div',{style:'min-height:80px'}));
    }

    // Fill in each day of the month
    const daysInMonth=new Date(yr,mo,0).getDate();
    for(let dayNum=1;dayNum<=daysInMonth;dayNum++){
      const dateStr=yr+'-'+mo.toString().padStart(2,'0')+'-'+dayNum.toString().padStart(2,'0');
      const dayPlan=days.find(d=>d.date===dateStr);
      const dt2=new Date(dateStr+'T12:00:00');
      const isSun=dt2.getDay()===0;
      const today=fmtDate(new Date());
      const isToday=dateStr===today;
      const isPast=dateStr<today;
      const isRest=!!(ST.restDays&&ST.restDays[dateStr]);
      const isUserWorkDay=ST.workDays.includes(dt2.getDay());

      // Styling
      let bgColor='var(--sur)';
      let borderColor='var(--bdr)';
      let opacity='1';
      if(isSun){bgColor='var(--sur2)';opacity='0.5';}
      else if(isRest){bgColor='var(--sur2)';opacity='0.6';}
      else if(!isUserWorkDay){bgColor='var(--sur2)';opacity='0.5';}
      if(isToday){borderColor='var(--acc)';}
      if(dayPlan?.isPast&&dayPlan?.goalMet){borderColor='var(--grn)';}
      if(dayPlan?.isPast&&!dayPlan?.goalMet&&dayPlan?.sections?.length>0){borderColor='var(--yel)';}

      const hasSections=dayPlan&&!dayPlan.skip&&dayPlan.sections&&dayPlan.sections.length>0;

      const cell=el('div',{style:`background:${bgColor};border:1.5px solid ${borderColor};border-radius:var(--rsm);padding:6px 7px;min-height:95px;opacity:${opacity};display:flex;flex-direction:column;gap:3px;cursor:pointer`,
        onclick:()=>openDayPanel(dayPlan,dateStr)});

      // Date number
      const dateEl=el('div',{style:`font-size:13px;font-weight:${isToday?'800':'700'};color:${isToday?'var(--acc)':isPast?'var(--tx2)':'var(--tx)'};margin-bottom:3px`},dayNum+'');
      if(isToday){
        const todayBadge=el('span',{style:'font-size:9px;background:var(--acc);color:white;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;vertical-align:middle'},'today');
        dateEl.appendChild(todayBadge);
      }
      cell.appendChild(dateEl);

      if(isRest){
        cell.appendChild(el('div',{style:'font-size:11px;color:var(--tx3)'},'🌙 rest day'));
      }else if(isSun||!isUserWorkDay){
        if(isSun)cell.appendChild(el('div',{style:'font-size:11px;color:var(--tx3)'},'day off'));
      }else if(dayPlan&&dayPlan.isPast&&dayPlan.sections.length===0){
        cell.appendChild(el('div',{style:'font-size:10px;color:var(--tx3);font-style:italic'},'nothing logged'));
      }else if(hasSections){
        if(dayPlan.isPast){
          const byCourse={};
          for(const s of dayPlan.sections){
            if(!byCourse[s.cId])byCourse[s.cId]={name:s.courseName,color:s.color,count:0,mins:0};
            byCourse[s.cId].count++;byCourse[s.cId].mins+=est(s);
          }
          for(const[,g]of Object.entries(byCourse)){
            const row=el('div',{style:`font-size:11px;padding:2px 5px;border-radius:3px;background:${g.color}33;color:${g.color};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis`});
            row.textContent=g.count+' section'+(g.count!==1?'s':'')+' · '+g.name;
            cell.appendChild(row);
          }
          const actualStr=dayPlan.actualMin>=60?Math.floor(dayPlan.actualMin/60)+'h'+(dayPlan.actualMin%60?Math.round(dayPlan.actualMin%60)+'m':''):dayPlan.actualMin+'m';
          cell.appendChild(el('div',{style:'font-size:10px;color:'+(dayPlan.goalMet?'var(--grn)':'var(--yel)')+';margin-top:2px;font-weight:600'},(dayPlan.goalMet?'✓ ':'⚠ ')+actualStr+' done'));
        }else{
          const byCourse={};
          for(const s of dayPlan.sections){
            if(!byCourse[s.cId])byCourse[s.cId]={name:s.courseName,color:s.color,count:0,mins:0};
            byCourse[s.cId].count++;byCourse[s.cId].mins+=est(s);
          }
          for(const[,g]of Object.entries(byCourse)){
            const row=el('div',{style:`font-size:11px;padding:2px 5px;border-radius:3px;background:${g.color}33;color:${g.color};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis`});
            const avgMin=g.count>0?Math.round(g.mins/g.count):0;
            row.textContent=g.count+' × '+avgMin+'min · '+g.name;
            cell.appendChild(row);
          }
          const totalM=dayPlan.sections.reduce((a,s)=>a+est(s),0);
          const hrs=totalM>=60?Math.floor(totalM/60)+'h'+(totalM%60?Math.round(totalM%60)+'m':''):totalM+'m';
          cell.appendChild(el('div',{style:'font-size:10px;color:var(--tx3);margin-top:2px'},hrs+' planned'));
        }
      }else if(!isSun&&isUserWorkDay&&isPast){
        cell.appendChild(el('div',{style:'font-size:11px;color:var(--tx3);font-style:italic'},'🎉 done'));
      }

      // Quick rest day toggle on cell (future work days only)
      if(!isSun&&isUserWorkDay&&!isPast){
        const qRest=el('div',{
          style:'position:absolute;top:4px;right:4px;font-size:11px;opacity:'+(isRest?'1':'0.25')+';cursor:pointer;transition:opacity .15s',
          title:isRest?'Remove rest day':'Mark as rest day',
          onclick:(e)=>{
            e.stopPropagation();
            if(!ST.restDays)ST.restDays={};
            if(ST.restDays[dateStr])delete ST.restDays[dateStr];
            else ST.restDays[dateStr]=true;
            save();render();
          }
        },'🌙');
        cell.style.position='relative';
        cell.appendChild(qRest);
      }

      grid.appendChild(cell);
    }

    monthEl.appendChild(grid);
    w.appendChild(monthEl);
  }
}

function closeDayPanel(){
  const p=document.getElementById('day-panel');
  const ov=document.getElementById('day-panel-overlay');
  if(p)p.classList.remove('open');
  if(ov)ov.classList.remove('open');
}

function openDayPanel(dayPlan,dateStr){
  const panel=document.getElementById('day-panel');
  const ov=document.getElementById('day-panel-overlay');
  if(!panel)return;
  panel.innerHTML='';

  const dt=new Date(dateStr+'T12:00:00');
  const dayName=dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const isRest=!!(ST.restDays&&ST.restDays[dateStr]);
  const today=fmtDate(new Date());
  const isPast=dateStr<today;
  const isToday=dateStr===today;

  // Header
  const hdr=el('div',{class:'dp-header'});
  const hdrLeft=el('div',{style:'flex:1;min-width:0'});
  hdrLeft.appendChild(el('div',{style:'font-family:Syne,sans-serif;font-size:15px;font-weight:800;color:var(--tx)'},dayName));
  const goalMin=dayPlan?dayPlan.goalMin:adaptiveGoalMin();
  const goalStr=goalMin>=60?Math.floor(goalMin/60)+'h'+(goalMin%60?Math.round(goalMin%60)+'m':''):goalMin+'m';
  hdrLeft.appendChild(el('div',{style:'font-size:11px;color:var(--tx3);margin-top:2px'},isRest?'🌙 Rest day':isPast?'Past day':'Goal: '+goalStr));
  hdr.appendChild(hdrLeft);

  // Rest day toggle — only for future days and today
  if(!isPast){
    const restBtn=el('button',{
      class:'btn btn-sm',
      style:isRest?'border-color:var(--acc);color:var(--acc);font-size:11px':'font-size:11px',
      onclick:(e)=>{
        e.stopPropagation();
        if(!ST.restDays)ST.restDays={};
        if(ST.restDays[dateStr])delete ST.restDays[dateStr];
        else ST.restDays[dateStr]=true;
        save();render();
        // Reopen panel after render with fresh plan
        setTimeout(()=>{
          const newPlan=buildCalendarPlan();
          const newDay=newPlan.find(p=>p.date===dateStr)||null;
          openDayPanel(newDay,dateStr);
        },50);
      }
    },isRest?'✓ Rest day':'Mark rest day');
    hdr.appendChild(restBtn);
  }
  const closeBtn=el('div',{class:'dp-close',onclick:closeDayPanel},'✕');
  hdr.appendChild(closeBtn);
  panel.appendChild(hdr);

  const body=el('div',{class:'dp-body'});

  if(isRest){
    body.appendChild(el('div',{style:'color:var(--tx2);font-size:13px;padding:20px 0;text-align:center'},'🌙 Rest day — no sections planned.'));
  }else if(isPast){
    // Past day — show what was actually done
    const actualIds=ST.dailyDone[dateStr]||[];
    if(actualIds.length===0){
      body.appendChild(el('div',{style:'color:var(--tx2);font-size:13px;padding:20px 0;text-align:center'},'Nothing logged for this day.'));
    }else{
      body.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px'},'Completed'));
      for(const id of actualIds){
        const sec=allS().find(s=>s.id===id);if(!sec||sec.ir)continue;
        const course=COURSES[sec.cId];if(!course)continue;
        const row=el('div',{class:'dp-sec done'});
        row.appendChild(el('div',{class:'dp-sec-dot',style:'background:'+course.color}));
        const info=el('div',{class:'dp-sec-info'});
        info.appendChild(el('div',{class:'dp-sec-title'},sec.t));
        info.appendChild(el('div',{class:'dp-sec-meta'},course.short+' · '+est(sec)+'min'));
        row.appendChild(info);
        row.appendChild(el('span',{style:'font-size:12px;color:var(--grn)'},'✓'));
        body.appendChild(row);
      }
    }
  }else if(dayPlan&&dayPlan.sections&&dayPlan.sections.length>0){
    // Future/today — show planned sections
    const label=isToday?'Today\'s plan':'Planned sections';
    body.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px'},label));

    // Group by course with a header per course
    let lastCId=null;
    const totalM=dayPlan.sections.reduce((a,s)=>a+est(s),0);
    for(const sec of dayPlan.sections){
      if(sec.cId!==lastCId){
        const course=COURSES[sec.cId];
        const courseHdr=el('div',{style:'display:flex;align-items:center;gap:6px;margin:8px 0 5px'});
        courseHdr.appendChild(el('span',{style:'width:8px;height:8px;border-radius:50%;background:'+course.color+';flex-shrink:0;display:inline-block'}));
        courseHdr.appendChild(el('span',{style:'font-size:11px;font-weight:700;color:'+course.color},course.name));
        body.appendChild(courseHdr);
        lastCId=sec.cId;
      }
      const isDone=!!ST.completed[sec.id];
      const row=el('div',{class:'dp-sec'+(isDone?' done':'')});
      const course=COURSES[sec.cId];
      row.appendChild(el('div',{class:'dp-sec-dot',style:'background:'+course.color+(isDone?';opacity:0.4':'')}));
      const info=el('div',{class:'dp-sec-info'});
      info.appendChild(el('div',{class:'dp-sec-title',style:isDone?'text-decoration:line-through':'' },sec.t));
      info.appendChild(el('div',{class:'dp-sec-meta'},est(sec)+'min'+(isDone?' · done':'')));
      row.appendChild(info);
      if(isDone)row.appendChild(el('span',{style:'font-size:12px;color:var(--grn)'},'✓'));
      body.appendChild(row);
    }
    // Total
    const hrs=totalM>=60?Math.floor(totalM/60)+'h'+(totalM%60?Math.round(totalM%60)+'m':''):totalM+'m';
    body.appendChild(el('div',{style:'margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr);font-size:12px;color:var(--tx2);display:flex;justify-content:space-between'},
      el('span',{},'Total planned'),el('span',{style:'font-weight:700;color:var(--tx)'},hrs)
    ));
    if(isToday){
      const btn=el('button',{class:'btn btn-p',style:'width:100%;margin-top:10px;font-size:13px',onclick:()=>{closeDayPanel();CV='today';CC_id=null;render();}},
        '→ Go to Today\'s Session');
      body.appendChild(btn);
    }
  }else{
    body.appendChild(el('div',{style:'color:var(--tx2);font-size:13px;padding:20px 0;text-align:center'},'Nothing planned for this day.'));
  }

  panel.appendChild(body);
  panel.classList.add('open');
  ov.classList.add('open');
}

// ═══ MAIN RENDER ════════════════════════════════════════════
let CV='today',CC_id=null;

function render(){
  const root=document.getElementById('root');
  if(!ST.setupDone){renderSetup();const mn=document.getElementById('mobile-nav');if(mn)mn.style.display='none';return;}
  if(needsWeeklyCheck()){renderWeeklyCheck();const mn=document.getElementById('mobile-nav');if(mn)mn.style.display='none';return;}
  root.innerHTML='';
  const gp=gprog();
  const app=d('');app.id='app';
  const tb=el('div',{id:'topbar'});
  const tbTitle=el('h1',{});
  tbTitle.appendChild(document.createTextNode('🎵 '));
  tbTitle.appendChild(el('span',{},'boopie'));
  const tbBoopie=makeBoopie('idle',32);
  tbBoopie.style.cssText='flex-shrink:0;overflow:visible;margin-left:4px;position:relative;top:2px';
  tbTitle.appendChild(tbBoopie);
  tb.appendChild(tbTitle);
  tb.appendChild(d('tbr',d('gpill',el('span',{style:'font-family:DM Sans,sans-serif;font-weight:700'},Math.round(gp*100)+'%'),(()=>{const b=d('gpill-bar');const f=d('gpill-fill');f.style.width=(gp*100)+'%';b.appendChild(f);return b;})()),
    el('button',{class:'btn btn-sm',onclick:exportSave},'💾 Save'),el('button',{class:'btn btn-sm tbr-load',onclick:importSave},'📂 Load')));
  app.appendChild(tb);
  // Day detail panel (calendar)
  if(!document.getElementById('day-panel')){
    const ov=document.createElement('div');ov.id='day-panel-overlay';
    ov.onclick=closeDayPanel;document.body.appendChild(ov);
    const panel=document.createElement('div');panel.id='day-panel';document.body.appendChild(panel);
  }
  const layout=el('div',{id:'layout'});app.appendChild(layout);
  const sb=el('div',{id:'sidebar'});

  function nb(icon,label,view,cId,pct,color,locked){
    cId=cId||null;
    const on=CV===view&&CC_id===cId;
    const cls='nb'+(on?' on':'')+(locked?' nb-lk':'');
    const btn=el('div',{class:cls,onclick:locked?null:()=>{CV=view;CC_id=cId;render();}},el('span',{class:'nbi'},icon),el('span',{class:'nbl'},label));
    if(locked)btn.appendChild(el('span',{class:'nbp',style:'color:var(--tx3)'},'🔒'));
    else if(pct!=null)btn.appendChild(el('span',{class:'nbp',style:'color:'+(pct>=1?'var(--grn)':color||'var(--tx3)')},pct>=1?'✓':Math.round(pct*100)+'%'));
    return btn;
  }

  sb.appendChild(el('div',{class:'sl'},'Daily'));
  sb.appendChild(nb('📅',"Today's Session",'today'));
  sb.appendChild(nb('📊','Dashboard','dashboard'));
  sb.appendChild(nb('📆','Calendar','calendar'));
  sb.appendChild(nb('📋','My Progress','history'));
  sb.appendChild(nb('🐙',"boopie's Journey",'journey'));
  sb.appendChild(nb('🎬','Video Resources','videos'));
  sb.appendChild(nb('⚙️','Settings','settings'));
  for(const ph of[1,2,3]){
    sb.appendChild(el('div',{class:'sl'},'Phase '+ph));
    for(const[cId,c]of Object.entries(COURSES)){
      if(c.phase!==ph)continue;
      const locked=!isUnlocked(cId);
      const lbl=locked?c.short+' (🔒)':c.short;
      sb.appendChild(nb(c.icon,lbl,'course',cId,cprog(cId),c.color,locked));
    }
  }
  layout.appendChild(sb);
  const content=el('div',{id:'content'});layout.appendChild(content);
  if(CV==='today')content.appendChild(vToday());
  else if(CV==='dashboard')content.appendChild(vDash());
  else if(CV==='calendar')content.appendChild(vCalendar());
  else if(CV==='history')content.appendChild(vHistory());
  else if(CV==='journey')content.appendChild(vJourney());
  else if(CV==='course'&&CC_id)content.appendChild(vCourse(CC_id));
  else if(CV==='videos')content.appendChild(vVideos());
  else if(CV==='settings')content.appendChild(vSettings());
  root.appendChild(app);

      const diffTag=diff?el('span',{style:'font-size:10px;margin-left:4px;opacity:0.7'},{easy:'⚡',ok:'😊',hard:'😓'}[diff]||''):null;
      const titleEl=el('div',{style:'font-size:13px;font-weight:500;'+(isDone?'text-decoration:line-through;color:var(--tx3)':'')},TI[item.tp]||'📖',' ',item.title+(skipped2?' ⏭️':''));
      if(diffTag)titleEl.appendChild(diffTag);
      const logDisp=existMin?existMin+'m logged':fmt(item.estMin)+' est.';
      const metaEl=el('div',{style:'font-size:11px;color:var(--tx3);margin-top:1px'},isDone?'✓ '+logDisp:fmt(item.estMin)+' est.');

      row.appendChild(ckBtn);row.appendChild(info);row.appendChild(timeWrap);

      // Action buttons
      if(isDone){
        row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);cursor:pointer;flex-shrink:0;padding:2px 6px;border:1px solid var(--bdr);border-radius:6px',
          title:'Undo',onclick:ev=>{ev.stopPropagation();toggleS(item.secId,null);}},'undo'));
      }else{
        row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);cursor:pointer;flex-shrink:0;padding:2px 6px;border:1px solid var(--bdr);border-radius:6px',
          title:'Skip this section (saved for review)',
          onclick:ev=>{ev.stopPropagation();skipS(item.secId);}},'skip'));
      }
      sesCard.appendChild(row);
    }
  }
  sesCard.appendChild(el('button',{class:'btn btn-sm',style:'margin-top:12px',onclick:()=>render()},'↺ Refresh'));
  w.appendChild(sesCard);

  // What I did today
  if(doneIds.length>0){
    const acCard=d('card');
    acCard.appendChild(el('div',{class:'ct'},"✅ Done today"));
    const normalIds=doneIds.filter(id=>!ST.skipped[id]);
    const skippedIds=doneIds.filter(id=>ST.skipped[id]);

    function doneRow(secId){
      const sec=allS().find(s=>s.id===secId);if(!sec)return null;
      const c=COURSES[sec.cId];
      const logged=ST.logged[secId];
      const isSkip=!!ST.skipped[secId];
      // checked box or skipped indicator
      const indicator=isSkip
        ? el('span',{style:'width:15px;height:15px;border-radius:4px;border:2px solid var(--tx3);background:transparent;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--tx3)'},'–')
        : el('span',{class:'done-ck'});
      const row=el('div',{class:'da-item'},
        indicator,
        el('span',{style:'flex:1;font-size:12px'},sec.t),
        el('span',{style:'font-size:10px;padding:2px 6px;border-radius:20px;font-weight:700;background:'+c.color+'44;border:1px solid '+c.color+'88;color:'+c.color},c.short),
        el('span',{style:'font-size:11px;color:var(--tx3)'},logged?logged+'m':fmt(est(sec)))
      );
      if(isSkip){
        row.appendChild(el('span',{style:'font-size:10px;color:var(--acc);cursor:pointer;margin-left:4px',title:'Un-skip',onclick:()=>unskipS(secId)},'↩'));
      }else{
        row.appendChild(el('span',{style:'font-size:10px;color:var(--tx3);cursor:pointer;margin-left:4px',title:'Undo',onclick:()=>toggleS(secId,null)},'✕'));
      }
      return row;
    }

    normalIds.forEach(id=>{const r=doneRow(id);if(r)acCard.appendChild(r);});

    if(skippedIds.length){
      acCard.appendChild(el('div',{style:'font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);padding:10px 0 5px;border-top:1px solid var(--bdr);margin-top:6px'},'⏭️ Skipped (saved for review)'));
      skippedIds.forEach(id=>{const r=doneRow(id);if(r)acCard.appendChild(r);});
    }

    acCard.appendChild(el('hr',{style:'border:none;border-top:1px solid var(--bdr);margin:12px 0'}));
    const byCourse={};
    normalIds.forEach(id=>{const sec=allS().find(s=>s.id===id);if(!sec)return;if(!byCourse[sec.cId])byCourse[sec.cId]=0;byCourse[sec.cId]+=(ST.logged[id]||est(sec));});
    const statRow=el('div',{style:'display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px'});
    for(const[cId,mins]of Object.entries(byCourse)){
      const c=COURSES[cId];
      const s2=el('div',{style:'background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:10px'});
      s2.appendChild(el('div',{style:'font-size:12px;font-weight:700;margin-bottom:3px'},c.icon+' '+c.short));
      s2.appendChild(el('div',{style:'font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:'+c.color},fmt(mins)));
      s2.appendChild(el('div',{style:'font-size:10px;color:var(--tx3);margin-top:2px'},Math.round(cprog(cId)*100)+'% total'));
      statRow.appendChild(s2);
    }
    if(Object.keys(byCourse).length)acCard.appendChild(statRow);
    w.appendChild(acCard);
  }
  return w;
}

// ═══ DASHBOARD ══════════════════════════════════════════════
function vDash(){

  try{

  const totalCoreSecs2=coreS().length;

  const overallPct=totalCoreSecs2>0?Math.round(totalDoneSecs2/totalCoreSecs2*100):0;

  // Stats row
  const wkStats=el('div',{style:'display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap'});

  [{v:weekDone.length,l:'Sections done',c:'var(--acc)'},{v:fmtM2(weekMins),l:'Time invested',c:'var(--tx)'},{v:weekDays+' days',l:'Active days',c:'var(--grn)'}].forEach(({v,l,c})=>{
    const b=el('div',{style:'background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 12px;flex:1;min-width:80px'});
    b.appendChild(el('div',{style:'font-size:17px;font-weight:700;color:'+c},v+''));
    b.appendChild(el('div',{style:'font-size:10px;color:var(--tx3);margin-top:1px'},l));
    wkStats.appendChild(b);
  });
  wkCard.appendChild(wkStats);

  // Overall progress bar with label
  const progRow=el('div',{style:'margin-bottom:10px'});
  progRow.appendChild(el('div',{style:'display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:4px'},
    el('span',{},'Overall project progress'),el('span',{style:'font-weight:700;color:var(--tx)'},overallPct+'% ('+totalDoneSecs2+'/'+totalCoreSecs2+' sections)')
  ));
  const wpb=el('div',{style:'height:8px;background:var(--sur3);border-radius:4px;overflow:hidden'});
  wpb.appendChild(el('div',{style:'height:100%;background:var(--grn);border-radius:4px;width:'+overallPct+'%;transition:width .6s'}));
  progRow.appendChild(wpb);
  wkCard.appendChild(progRow);

  // Sections completed this week grouped by course
  if(weekDone.length){
    wkCard.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px'},'Completed this week'));
    const byCourse={};
    for(const s of weekDone){
      if(!byCourse[s.cId])byCourse[s.cId]={course:COURSES[s.cId],secs:[]};
      byCourse[s.cId].secs.push(s);
    }
    for(const{course,secs}of Object.values(byCourse)){
      const cr=el('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:5px'});
      cr.appendChild(el('span',{style:'font-size:11px;padding:2px 8px;border-radius:20px;background:'+course.color+'44;border:1px solid '+course.color+'88;color:'+course.color+';font-weight:600;flex-shrink:0'},course.short));
      cr.appendChild(el('span',{style:'font-size:12px;color:var(--tx2)'},secs.length+' section'+(secs.length!==1?'s':'')));
      wkCard.appendChild(cr);
    }
  }else{
    wkCard.appendChild(el('div',{style:'font-size:12px;color:var(--tx3);font-style:italic'},'No sections completed yet this week. You\'ve got this! 🦀'));
  }

  // Weekly summary moved to bottom of dashboard

  // Hero
  const hero=d('hprog');
  const hr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'});
  hr.appendChild(el('span',{style:'font-size:16px;font-weight:700;font-family:Syne,sans-serif;color:var(--tx)'},'Overall Progress'));
  hr.appendChild(el('span',{style:'font-family:DM Sans,sans-serif;font-size:16px;font-weight:700'},Math.round(gp*100)+'%'));
  hero.appendChild(hr);

  // Bigger bar with phase markers
  const barWrap=el('div',{style:'position:relative;margin-bottom:4px'});
  const gpb=pb(gp,'linear-gradient(90deg,#16a35a,#22c55e)',16);
  gpb.style.borderRadius='8px';
  gpb.querySelector('.pf').classList.add('pf-glow');
  barWrap.appendChild(gpb);

  // Phase marker positions — calculate what % of total core sections each phase ends at
  const allCore=coreS();const totalCoreSecs=allCore.length;
  const ph1Secs=allCore.filter(s=>COURSES[s.cId]&&COURSES[s.cId].phase===1).length;
  const ph2Secs=allCore.filter(s=>COURSES[s.cId]&&(COURSES[s.cId].phase===1||COURSES[s.cId].phase===2)).length;
  const ph1Pct=totalCoreSecs>0?(ph1Secs/totalCoreSecs*100).toFixed(1):'33';
  const ph2Pct=totalCoreSecs>0?(ph2Secs/totalCoreSecs*100).toFixed(1):'66';
  [{pct:'33.3',label:'Ph.1'},{pct:'66.6',label:'Ph.2'},{pct:'99.5',label:'Ph.3'}].forEach(m=>{
    const mk=el('div',{style:'position:absolute;top:0;bottom:0;left:'+m.pct+'%;width:2px;background:rgba(255,255,255,0.55);pointer-events:none;border-radius:1px'});
    barWrap.appendChild(mk);
    const lbl=el('div',{style:'position:absolute;top:-18px;transform:translateX(-50%);left:'+m.pct+'%;font-size:9px;font-weight:700;color:var(--tx3);white-space:nowrap'});
    lbl.textContent=m.label;
    barWrap.appendChild(lbl);

  hero.appendChild(el('div',{style:'height:18px'})); // space for labels
  hero.appendChild(barWrap);

  const hs=el('div',{style:'display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--tx2)'});
  hs.appendChild(t(csDone+' / '+csTotal+' core sections'));hs.appendChild(t(resDone+' / '+resTotal+' resources'));
  hero.appendChild(hs);

  // Phase progress bars
  const phaseColors={1:'#5b6ef5',2:'#7c3aed',3:'#a855f7'};
  const phaseNames={1:'Phase 1',2:'Phase 2',3:'Phase 3'};
  [1,2,3].forEach(ph=>{
    const phSecs=coreS().filter(s=>COURSES[s.cId]&&COURSES[s.cId].phase===ph);
    if(!phSecs.length)return;
    const phDone=phSecs.filter(s=>ST.completed[s.id]).length;
    const phPct=phSecs.length>0?Math.round(phDone/phSecs.length*100):0;

    const phHdr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:3px'});
    phHdr.appendChild(el('span',{style:'font-size:11px;font-weight:600;color:var(--tx2)'},phaseNames[ph]));
    phHdr.appendChild(el('span',{style:'font-size:11px;color:var(--tx3)'},phDone+'/'+phSecs.length+' · '+phPct+'%'));
    phRow.appendChild(phHdr);
    const phPb=el('div',{style:'height:6px;background:var(--sur3);border-radius:3px;overflow:hidden'});
    const phPf=el('div',{style:'height:100%;border-radius:3px;width:'+phPct+'%;background:'+phaseColors[ph]+';transition:width .6s'});
    phPb.appendChild(phPf);phRow.appendChild(phPb);
    hero.appendChild(phRow);
  });

  w.appendChild(hero);

  // Stats — reordered
  const dA=daysActive();
  // Compute finish dates for ALL courses using cascade logic
  const allFinishes={};
  for(const cId of Object.keys(COURSES)){
    try{
      if(cprog(cId)>=1){allFinishes[cId]=null;continue;}
      allFinishes[cId]=cascadeFinish(cId).deadline;
    }catch(e){allFinishes[cId]='—';}
  }
  // Phase 1 finish = latest finish among phase 1 courses
  const ph1Dates=Object.entries(COURSES)
    .filter(([,c])=>c.phase===1)
    .map(([cId])=>allFinishes[cId])
    .filter(d=>d&&d!=='—');
  ph1Dates.sort();
  const ph1Finish=ph1Dates.length?ph1Dates[ph1Dates.length-1]:'Not set';
  // Project finish = latest finish across ALL courses (always >= ph1)
  const allDates=Object.values(allFinishes).filter(d=>d&&d!=='—');
  allDates.sort();
  const projFinish=allDates.length?allDates[allDates.length-1]:(edl||'Not set');
  // Avg hrs/day worked — total logged/completed time divided by days active
  const totalDoneMin=doneMin();
  const avgMin=dA>0?Math.round(totalDoneMin/dA)+'min':'—';
  // Days completed = days where done minutes >= that day's goal
  const daysCompleted=Object.keys(ST.dailyDone).filter(k=>{
    const ids=ST.dailyDone[k]||[];
    if(!ids.length)return false;
    const doneM=ids.reduce((a,id)=>{const sec=allS().find(s=>s.id===id);return a+(sec?est(sec):0);},0);
    const goalM=(ST.todayCommitHrs&&ST.todayCommitHrs[k])?ST.todayCommitHrs[k]*60:ST.hoursPerDay*60;
    return doneM>=goalM;
  }).length;

      el('span',{style:'width:7px;height:7px;border-radius:50%;background:'+PC[ph]+';flex-shrink:0;display:inline-block'},''),

      if(locked2)ch.appendChild(el('span',{style:'font-size:10px;padding:2px 7px;border-radius:20px;background:var(--sur2);border:1px solid var(--bdr);color:var(--tx3);font-weight:600'},'🔒 Locked'));
      card.appendChild(ch);
      const pr=el('div',{style:'display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:4px'});
      pr.appendChild(t(Math.round(cp*100)+'% complete · '+fmt(rem2)+' remaining'));

      const ftStyle='margin-top:6px;font-size:11px;color:var(--tx3)';
      if(cp>=1){
        card.appendChild(el('div',{style:ftStyle},'✓ Finished'));
      }else if(locked2){
        const prereq=COURSES[c.unlockAfter];
        card.appendChild(el('div',{style:ftStyle},'Unlocks after '+prereq.name+' · Est. finish: '+sched.deadline+' · Full '+ST.hoursPerDay+' hrs/day'));
      }else{
        card.appendChild(el('div',{style:ftStyle},'Est. finish: '+sched.deadline+'  ·  '+sched.hpdStr+' hrs/day (proportional)'));
      }

    }
    w.appendChild(phd);

  const intentionKeys=Object.keys(intentions).sort().reverse(); // most recent first
  const pastIntentions=intentionKeys.filter(k=>{
    const i=intentions[k];
    return i&&i.goal&&!i.skipped&&k<currentWeekKey(); // past weeks only

  if(pastIntentions.length>0){
    const histCard=el('div',{style:'background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-top:12px'});
    histCard.appendChild(el('div',{style:'font-family:Syne,sans-serif;font-size:14px;font-weight:700;margin-bottom:14px'},'📅 Weekly History'));

      const sunDate=new Date(monDate);sunDate.setDate(monDate.getDate()+6);
      const weekLabel=monDate.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+sunDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

      const weekEl=el('div',{style:'border:1px solid var(--bdr);border-radius:var(--rsm);padding:12px 14px;margin-bottom:10px;background:var(--sur2)'});

        const pct=goalTotal>0?Math.min(Math.round(intent.actualMins/goalTotal*100),100):0;
        const metGoal=pct>=80;
        wHdr.appendChild(el('span',{style:'font-size:10px;padding:2px 8px;border-radius:20px;background:'+(metGoal?'rgba(22,163,90,.1)':'rgba(245,200,66,.1)')+';border:1px solid '+(metGoal?'rgba(22,163,90,.3)':'rgba(245,200,66,.3)')+';color:'+(metGoal?'var(--grn)':'var(--yel)')+';font-weight:600'},(metGoal?'✓ ':'⚠ ')+actStr+' actual · '+days+' days'));
      }
      weekEl.appendChild(wHdr);

      // Focus
      if(intent.focus){
        weekEl.appendChild(el('div',{style:'font-size:12px;color:var(--tx2);margin-bottom:6px;font-style:italic'},'"'+intent.focus+'"'));
      }

      // Work days
      if(intent.workDays&&intent.workDays.length){
        const dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
        const daysRow=el('div',{style:'display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap'});
        [0,1,2,3,4,5,6].forEach(i=>{
          const on=intent.workDays.includes(i);
          daysRow.appendChild(el('span',{style:'font-size:10px;padding:1px 5px;border-radius:4px;background:'+(on?'var(--acc)':'var(--sur3)')+';color:'+(on?'white':'var(--tx3)')+';font-weight:'+(on?'600':'400')},dayNames[i]));
        });
        weekEl.appendChild(daysRow);
      }

      // Reflection
      if(intent.reflection){
        const refEl=el('div',{style:'background:var(--sur);border-radius:var(--rsm);padding:8px 10px;font-size:12px;color:var(--tx2);line-height:1.5;border-left:3px solid var(--acc);margin-top:4px'});
        refEl.textContent=intent.reflection;
        weekEl.appendChild(refEl);
      }else{
        weekEl.appendChild(el('div',{style:'font-size:11px;color:var(--tx3);font-style:italic'},'No reflection written'));
      }

      histCard.appendChild(weekEl);
    });

    w.appendChild(histCard);
  }

  // Momentum score at bottom
  const mom=momentumScore();
  if(mom){
    const fmtM=m=>m>=60?Math.floor(m/60)+'h'+(m%60?m%60+'m':''):m+'m';
    const arrow=mom.dir==='up'?'↑':'↓';
    const color=mom.dir==='up'?'var(--grn)':'var(--yel)';
    const momBar=el('div',{style:'background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:10px 14px;margin-top:8px;display:flex;align-items:center;gap:10px;font-size:13px'});
    momBar.appendChild(el('span',{style:'font-size:18px'},mom.dir==='up'?'📈':'📉'));
    momBar.appendChild(el('span',{style:'flex:1;color:var(--tx2)'},'This week vs last week'));
    momBar.appendChild(el('span',{style:'font-weight:700;color:'+color},arrow+' '+mom.pct+'%'));
    momBar.appendChild(el('span',{style:'color:var(--tx3);font-size:11px'},fmtM(mom.thisWeek)+' vs '+fmtM(mom.lastWeek)));
    w.appendChild(momBar);
  }
  }catch(e){
    console.error('vDash error:',e);
    w.appendChild(el('div',{style:'color:red;padding:20px;font-size:13px'},'Dashboard error: '+e.message+'\n'+e.stack));
  }
  return w;
}
